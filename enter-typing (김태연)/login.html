<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 엔터핑</title>
    <meta name="description" content="엔터핑에 로그인하고 타이핑 여정을 이어가세요.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <style>
        /* 로그인 페이지 전용 스타일 */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: var(--color-ivory);
            overflow-x: hidden;
        }

        .auth-page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 60px;
            position: relative;
        }

        /* 배경 블러 장식 */
        .auth-page::before {
            content: '';
            position: fixed;
            top: -100px;
            left: -100px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(255, 182, 193, 0.18);
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        .auth-page::after {
            content: '';
            position: fixed;
            bottom: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(173, 216, 230, 0.18);
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        /* 카드 */
        .auth-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 52px 48px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.07);
            border: 1px solid rgba(0, 0, 0, 0.04);
            position: relative;
            z-index: 1;
            animation: cardFadeIn 0.5s ease;
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* 상단 로고 */
        .auth-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--color-text-main);
            margin-bottom: 32px;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
        }

        .auth-logo .logo-icon {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border-radius: 50%;
            padding: 5px;
            font-size: 1.2rem;
        }

        /* 제목 */
        .auth-heading {
            font-size: 1.9rem;
            font-weight: 900;
            color: var(--color-text-main);
            margin-bottom: 8px;
            text-align: center;
        }

        .auth-subheading {
            font-size: 0.95rem;
            color: var(--color-text-muted);
            text-align: center;
            margin-bottom: 36px;
            font-weight: 500;
        }

        /* 입력 폼 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--color-text-main);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid var(--color-border);
            border-radius: 14px;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.97rem;
            color: var(--color-text-main);
            background-color: #fafafa;
            transition: border-color 0.2s, box-shadow 0.2s, background-color 0.2s;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--color-pink);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(255, 182, 193, 0.2);
        }

        .form-input::placeholder {
            color: #bbb;
            font-weight: 400;
        }

        /* 비밀번호 찾기 링크 */
        .form-extras {
            display: flex;
            justify-content: flex-end;
            margin-top: -8px;
            margin-bottom: 16px;
        }

        .form-extras a {
            font-size: 0.85rem;
            color: var(--color-text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .form-extras a:hover {
            color: var(--color-pink);
        }

        /* 로그인 버튼 */
        .btn-auth {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: none;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-auth-primary {
            background: linear-gradient(135deg, var(--color-pink) 0%, #FFD6DC 100%);
            color: var(--theme-text-main);
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.4);
        }

        .btn-auth-primary:hover {
            background: linear-gradient(135deg, var(--color-pink-hover) 0%, var(--color-pink) 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 182, 193, 0.5);
            color: #fff;
        }

        /* 구분선 */
        .divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 28px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--color-border);
        }

        .divider span {
            font-size: 0.82rem;
            color: #bbb;
            font-weight: 600;
            white-space: nowrap;
        }

        /* 소셜 로그인 버튼 */
        .social-btns {
            display: flex;
            gap: 12px;
        }

        .btn-social {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: 1.5px solid var(--color-border);
            background-color: #fff;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--color-text-main);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-social:hover {
            background-color: #f8f9fa;
            border-color: #ccc;
            transform: translateY(-1px);
        }

        .btn-social .social-icon {
            font-size: 1.1rem;
        }

        /* 회원가입 유도 */
        .auth-footer-text {
            text-align: center;
            margin-top: 30px;
            font-size: 0.92rem;
            color: var(--color-text-muted);
            font-weight: 500;
        }

        .auth-footer-text a {
            color: var(--color-pink);
            text-decoration: none;
            font-weight: 700;
            margin-left: 4px;
            transition: color 0.2s;
        }

        .auth-footer-text a:hover {
            color: var(--color-pink-hover);
            text-decoration: underline;
        }

        /* 에러 메시지 */
        .form-error {
            font-size: 0.82rem;
            color: #e74c3c;
            margin-top: 6px;
            display: none;
            font-weight: 600;
        }

        .form-error.visible {
            display: block;
        }

        /* 입력 오류 상태 */
        .form-input.error {
            border-color: #e74c3c;
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.12);
        }
    </style>

    <script>
        if (localStorage.getItem('ep_theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <!-- 상단 네비게이션 바 -->
    <header class="navbar">
        <div class="nav-left">
            <div class="logo" onclick="location.href='index.html'">
                <img src="assets/logo_icon.png" alt="엔터핑 아이콘" class="logo-img">
                <span class="logo-text">엔터핑</span>
            </div>
            <nav class="nav-links">
                <a href="typing_list.html">타이핑</a>
                <a href="quiz_list.html">퀴즈</a>
                <a href="ranking.html">랭킹</a>
                <a href="battle.html">실시간 대전</a>
            </nav>
        </div>
        <div class="nav-center">
            <div class="search-bar" onclick="location.href='search.html'">
                <span class="search-icon"><i class="ph-bold ph-magnifying-glass"></i></span>
                <input type="text" placeholder="곡명, 아티스트 검색" readonly>
                <span class="shortcut">Enter</span>
            </div>
        </div>
        <div class="nav-right">
            <a href="notice.html" class="nav-notice-link" style="margin-right: 20px; text-decoration: none; color: var(--color-text-muted); font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; transition: all 0.2s;" onmouseover="this.style.color='var(--color-pink)'; this.style.backgroundColor='rgba(255, 182, 193, 0.15)';" onmouseout="this.style.color='var(--color-text-muted)'; this.style.backgroundColor='transparent';"><i class="ph-fill ph-bell"></i> 공지</a>
            <div class="auth-group">
                <button class="auth-login" onclick="location.href='login.html'" style="color: var(--color-pink); background-color: rgba(255,182,193,0.12);">로그인</button>
                <button class="auth-signup" onclick="location.href='signup.html'">회원가입</button>
            </div>
        </div>
    </header>

    <!-- 공통 navbar 상태 관리 -->
    <script src="navbar.js?v=2.0.0"></script>
    <!-- 로그인 폼 영역 -->
    <main class="auth-page">
        <div class="auth-card">
            <!-- 로고 -->
            <a href="index.html" class="auth-logo">
                <img src="assets/logo_icon.png" alt="엔터핑 아이콘" style="height:38px;width:auto;">
                <span>엔터핑</span>
            </a>

            <h1 class="auth-heading">다시 만나서 반가워요!</h1>
            <p class="auth-subheading">로그인하고 타이핑 여정을 이어가세요 </p>

            <form id="loginForm" novalidate>
                <!-- 이메일 -->
                <div class="form-group">
                    <label class="form-label" for="login-email">이메일</label>
                    <input
                        id="login-email"
                        class="form-input"
                        type="email"
                        placeholder="example@email.com"
                        autocomplete="email"
                        required
                    >
                    <span class="form-error" id="email-error">올바른 이메일 형식을 입력해주세요.</span>
                </div>

                <!-- 비밀번호 -->
                <div class="form-group">
                    <label class="form-label" for="login-password">비밀번호</label>
                    <input
                        id="login-password"
                        class="form-input"
                        type="password"
                        placeholder="비밀번호를 입력하세요"
                        autocomplete="current-password"
                        required
                    >
                    <span class="form-error" id="password-error">비밀번호를 입력해주세요.</span>
                </div>

                <!-- 비밀번호 찾기 -->
                <div class="form-extras">
                    <a href="forgot_password.html">비밀번호를 잊으셨나요?</a>
                </div>

                <!-- 로그인 버튼 -->
                <button id="login-btn" type="submit" class="btn-auth btn-auth-primary">로그인</button>
            </form>

            <!-- 회원가입 유도 -->
            <p class="auth-footer-text">
                아직 계정이 없으신가요?
                <a href="signup.html">회원가입하기</a>
            </p>
        </div>
    </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            let valid = true;

            const emailInput    = document.getElementById('login-email');
            const passwordInput = document.getElementById('login-password');
            const emailError    = document.getElementById('email-error');
            const passwordError = document.getElementById('password-error');
            const loginBtn      = document.getElementById('login-btn');

            // 이메일 유효성 검사
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(emailInput.value.trim())) {
                emailInput.classList.add('error');
                emailError.classList.add('visible');
                valid = false;
            } else {
                emailInput.classList.remove('error');
                emailError.classList.remove('visible');
            }

            // 비밀번호 유효성 검사
            if (passwordInput.value.trim() === '') {
                passwordInput.classList.add('error');
                passwordError.classList.add('visible');
                valid = false;
            } else {
                passwordInput.classList.remove('error');
                passwordError.classList.remove('visible');
            }

            if (!valid) return;

            loginBtn.disabled = true;
            loginBtn.textContent = '로그인 중...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: emailInput.value.trim(),
                        password: passwordInput.value
                    })
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    // 로그인 상태 저장 (navbar.js?v=2.0.0가 이 정보를 읽어 프로필 아이콘 표시)
                    const nickname = data.nickname || emailInput.value.trim().split('@')[0];
                    NavAuth.setUser({
                        email: emailInput.value.trim(),
                        nickname: nickname,
                        token: data.access_token
                    });

                    if (data.requires_password_change) {
                        // 임시 비밀번호 로그인 → 강제 비밀번호 변경
                        sessionStorage.setItem('change_pw_email', emailInput.value.trim());
                        location.href = 'change_password.html';
                    } else {
                        location.href = 'index.html';
                    }
                } else {
                    passwordInput.classList.add('error');
                    passwordError.textContent = data.detail || '이메일 또는 비밀번호가 올바르지 않습니다.';
                    passwordError.classList.add('visible');
                }
            } catch (err) {
                passwordError.textContent = '서버에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.';
                passwordError.classList.add('visible');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = '로그인';
            }
        });

        // 입력 시 에러 초기화
        document.getElementById('login-email').addEventListener('input', function () {
            this.classList.remove('error');
            document.getElementById('email-error').classList.remove('visible');
        });
        document.getElementById('login-password').addEventListener('input', function () {
            this.classList.remove('error');
            document.getElementById('password-error').classList.remove('visible');
        });
    </script>
</body>

</html>
