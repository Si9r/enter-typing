<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>곡 상세 정보 - 엔터핑</title>
    <!-- 구글 폰트 적용 (Outfit & Noto Sans KR) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--color-ivory); /* 연분홍빛 아이보리 배경 유지 */
            color: var(--color-text-main);
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding-top: 100px; /* 네비게이션 바 공간 확보 */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .detail-wrapper {
            width: 90%;
            max-width: 900px;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 182, 193, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: row;
            margin-bottom: 60px;
            animation: slideUp 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .detail-wrapper {
                flex-direction: column;
            }
            .left-visual-panel {
                width: 100% !important;
                padding: 30px !important;
            }
            .right-info-panel {
                width: 100% !important;
                padding: 30px !important;
            }
        }

        /* ── 좌측 비주얼 패널 (앨범 커버 & 제목) ── */
        .left-visual-panel {
            width: 45%;
            background: #fafafa;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid rgba(0, 0, 0, 0.03);
            text-align: center;
        }

        .album-cover {
            width: 100%;
            aspect-ratio: 1; /* 1:1 정사각 앨범 아트 */
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15), 0 2px 10px rgba(255, 182, 193, 0.3);
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s;
        }

        .album-cover:hover {
            transform: scale(1.02) rotate(1deg);
        }

        .album-cover-visual-text {
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
            letter-spacing: 2px;
        }

        .detail-song-title {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--color-text-main);
            margin: 0 0 8px 0;
            line-height: 1.3;
        }

        .detail-artist-name {
            font-size: 1rem;
            color: var(--color-text-muted);
            font-weight: 600;
            margin: 0 0 20px 0;
        }

        /* 난이도 & 메타태그 라벨 */
        .detail-meta-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tag-badge {
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 0.82rem;
            font-weight: 800;
        }

        .tag-badge.easy {
            background-color: rgba(144, 238, 144, 0.25);
            color: #2b7a2b;
        }

        .tag-badge.medium {
            background-color: rgba(173, 216, 230, 0.3);
            color: #27627a;
        }

        .tag-badge.hard {
            background-color: rgba(255, 182, 193, 0.3);
            color: #b33951;
        }

        .tag-badge.genre {
            background-color: #f0f0f0;
            color: #555555;
        }

        /* ── 우측 정보 패널 (가사 미리보기 & 액션) ── */
        .right-info-panel {
            width: 55%;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .panel-title {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--color-text-main);
            border-bottom: 2px solid rgba(0, 0, 0, 0.03);
            padding-bottom: 10px;
        }

        /* 가사 미리보기창 */
        .lyrics-preview-container {
            flex-grow: 1;
            background-color: rgba(0, 0, 0, 0.01);
            border: 1px solid rgba(0, 0, 0, 0.03);
            border-radius: 16px;
            padding: 20px;
            max-height: 280px;
            overflow-y: auto;
            margin-bottom: 30px;
        }

        .lyrics-preview-line {
            margin-bottom: 16px;
            border-left: 3px solid var(--color-pink);
            padding-left: 10px;
        }

        .lyrics-preview-line:last-child {
            margin-bottom: 0;
        }

        .lyrics-preview-kanji {
            font-size: 1.05rem;
            font-weight: 700;
            color: #111;
            margin-bottom: 2px;
        }

        .lyrics-preview-furigana {
            font-size: 0.85rem;
            color: var(--color-pink-hover);
            font-weight: 700;
        }

        /* 액션 버튼 그룹 */
        .action-button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .action-btn-primary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            background-color: var(--color-pink);
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 800;
            padding: 16px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.4);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-align: center;
            border: none;
            cursor: pointer;
        }

        .action-btn-primary:hover {
            background-color: var(--color-pink-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 182, 193, 0.6);
        }

        .action-btn-secondary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-decoration: none;
            color: var(--color-text-muted);
            background-color: #f3f3f3;
            font-size: 0.95rem;
            font-weight: 700;
            padding: 12px 24px;
            border-radius: 14px;
            transition: all 0.25s;
            text-align: center;
        }

        .action-btn-secondary:hover {
            background-color: #e5e5e5;
            color: var(--color-text-main);
        }

    </style>
</head>
<body>

    <!-- 공통 네비게이션 바 -->
    <nav class="navbar">
        <div class="nav-left">
            <div class="logo" onclick="location.href='index.html'">
                <span style="font-size: 1.8rem;">🎵</span>
                <span>엔터핑</span>
            </div>
            <div class="nav-links">
                <a href="index.html">홈</a>
                <a href="typing_list.html" class="active">타이핑</a>
                <a href="ranking.html">랭킹</a>
                <a href="notice.html">공지사항</a>
            </div>
        </div>
        <div class="nav-right">
            <div class="auth-group">
                <button class="auth-login" onclick="location.href='login.html'">로그인</button>
                <button class="auth-signup" onclick="location.href='signup.html'">회원가입</button>
            </div>
        </div>
    </nav>

    <!-- 상세 페이지 메인 레이아웃 -->
    <div class="detail-wrapper" id="detail-card">
        <!-- 자바스크립트로 데이터를 렌더링 -->
    </div>

    <!-- 공통 네비게이션 바 및 공용 가사 데이터베이스 로드 -->
    <script src="navbar.js"></script>


    <!-- 상세 정보 렌더링 스크립트 (DB API fetch 방식으로 전환) -->
    <script>
        // URL 파라미터에서 songId 추출
        const urlParams = new URLSearchParams(window.location.search);
        const songId = parseInt(urlParams.get('songId')) || 1;

        // 난이도에 따른 뱃지 클래스
        function getDiffClass(difficulty) {
            if (difficulty === '초급') return 'easy';
            if (difficulty === '중급') return 'medium';
            return 'hard';
        }

        // ★ /api/songs/{songId} API에서 곡 상세 정보 fetch
        async function loadDetail() {
            const detailCard = document.getElementById('detail-card');
            detailCard.innerHTML = '<p style="text-align:center; padding: 80px; color: #aaa;">🎵 곡 정보 불러오는 중...</p>';
            try {
                const res = await fetch(`/api/songs/${songId}`);
                if (!res.ok) throw new Error('곡을 찾을 수 없습니다.');
                const song = await res.json();

                detailCard.innerHTML = `
                    <!-- 좌측 비주얼 패널 -->
                    <div class="left-visual-panel">
                        <div class="album-cover" style="background: ${song.gradient};">
                            <span class="album-cover-visual-text">${song.short_code}</span>
                        </div>
                        <h2 class="detail-song-title">${song.title}</h2>
                        <p class="detail-artist-name">${song.artist}</p>
                        <div class="detail-meta-tags">
                            <span class="tag-badge ${getDiffClass(song.difficulty)}">🔥 ${song.difficulty}</span>
                            <span class="tag-badge genre">🏷 ${song.genre}</span>
                            <span class="tag-badge genre">⏱ ${song.duration}</span>
                        </div>
                    </div>

                    <!-- 우측 정보 패널 -->
                    <div class="right-info-panel">
                        <h3 class="panel-title">📃 가사 및 후리가나 독음 미리보기</h3>
                        <div class="lyrics-preview-container">
                            ${song.lines.map(line => `
                                <div class="lyrics-preview-line">
                                    <div class="lyrics-preview-kanji">${line.kanji}</div>
                                    <div class="lyrics-preview-furigana">${line.furigana}</div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="action-button-group">
                            <a href="typing.html?songId=${songId}" class="action-btn-primary">
                                <span>🚀 타이핑 시작하기</span>
                            </a>
                            <a href="typing_list.html" class="action-btn-secondary">
                                <span>⬅ 곡 리스트로 돌아가기</span>
                            </a>
                        </div>
                    </div>
                `;
            } catch (e) {
                detailCard.innerHTML = `<p style="text-align:center; padding: 80px; color: #e74c3c;">곡 정보를 불러올 수 없습니다.</p>`;
                console.error(e);
            }
        }

        loadDetail();
    </script>
</body>
</html>
