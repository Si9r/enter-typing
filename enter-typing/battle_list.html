<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 대전 목록 - 엔터핑</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        .page-wrapper { padding-top: 100px; padding-bottom: 50px; min-height: calc(100vh - 100px); max-width: 1200px; margin: 0 auto; }
        
        .section-header h2 {
            color: var(--color-text-main);
            font-weight: 900;
        }

        /* 버튼 스타일 */
        .btn-refresh {
            background: #fff;
            color: var(--color-text-main);
            border: 1px solid var(--color-border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn-refresh:hover {
            background: #fafafa;
            border-color: #ddd;
        }

        /* 카드 UI */
        .card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px); 
            border: 2px solid #ffe3e4; 
            box-shadow: 0 8px 32px rgba(255, 182, 193, 0.15); 
            border-radius: 24px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        /* 폼 스타일 */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--color-text-main); font-size: 1rem; }
        .form-group input[type="text"], .form-group select { width: 100%; padding: 15px; background: #fff; border: 2px solid #eee; color: var(--color-text-main); border-radius: 14px; font-size: 1rem; outline: none; transition: all 0.2s; font-family: inherit; }
        .form-group input[type="text"]:focus, .form-group select:focus { border-color: var(--color-pink); box-shadow: 0 0 10px rgba(255, 182, 193, 0.2); }
        
        .btn-create { background: var(--color-pink); color: white; font-size: 1.05rem; padding: 12px 25px; border-radius: 12px; font-weight: bold; border: none; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px rgba(255, 182, 193, 0.4); }
        .btn-create:hover { background: var(--color-pink-hover); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255, 182, 193, 0.6); }
        .btn-random { background: #fff; color: var(--color-text-main); border: 2px solid #eee; border-radius: 12px; padding: 0 20px; white-space: nowrap; transition: all 0.2s; font-weight: bold; cursor: pointer;}
        .btn-random:hover { border-color: var(--color-pink); color: var(--color-pink); }
        .btn-cancel { background: #f0f2f5; color: var(--color-text-main); font-size: 1.05rem; padding: 12px 25px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; }
        .btn-cancel:hover { background: #e4e6e9; }

        /* 방 목록 카드 */
        .room-card { 
            background: rgba(255, 255, 255, 0.9); 
            border: 1px solid rgba(0, 0, 0, 0.05); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            border-radius: 16px;
            padding: 20px;
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        .room-card:hover { 
            transform: translateY(-3px); 
            border-color: var(--color-pink); 
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.2); 
        }
        .room-card-title { color: var(--color-text-main); font-size: 1.2rem; font-weight: 800; margin-bottom: 8px; }
        .room-card-desc { color: var(--color-text-muted); font-size: 0.9rem; margin-bottom: 12px; flex-grow: 1; }
        .room-card-footer { border-top: 1px dashed rgba(0,0,0,0.05); padding-top: 12px; margin-top: auto; display: flex; justify-content: space-between; align-items: center;}
        .room-card-footer .plays { color: var(--color-pink); font-weight: 900; font-size: 1.05rem; }

        /* 상태 뱃지 */
        .card-badge { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 800; margin-bottom: 10px; letter-spacing: 0.5px; }
        .card-badge.green {
            background: rgba(144, 238, 144, 0.2);
            color: #2F7A2F;
            border: 1px solid rgba(144, 238, 144, 0.4);
        }
        .card-badge.pink {
            background: rgba(255, 182, 193, 0.2);
            color: #D84B6B;
            border: 1px solid rgba(255, 182, 193, 0.4);
        }

        .empty-state {
            grid-column: 1 / -1; 
            text-align: center; 
            color: var(--color-text-muted); 
            padding: 60px 20px; 
            font-size: 1.1rem; 
            background: rgba(255,255,255,0.5); 
            border-radius: 16px; 
            border: 1px dashed rgba(0,0,0,0.1);
            font-weight: 600;
        }

        /* 모달 스타일 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 1000; animation: fadeIn 0.2s; }
        .modal-content { background: #fff4f3; border: 2px solid #ffe3e4; padding: 40px; border-radius: 24px; width: 450px; max-width: 90%; box-shadow: 0 20px 60px rgba(255, 182, 193, 0.2); color: var(--color-text-main); }
        .modal-content h2 { margin-top: 0; margin-bottom: 30px; color: var(--color-text-main); font-weight: 900; font-size: 1.6rem; text-align: center; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 15px; margin-top: 35px; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 반응형 그리드 */
        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="nav-left">
            <div class="logo" onclick="location.href='index.html'">
                <img src="assets/logo_icon.png" alt="엔터핑 아이콘" class="logo-img">
                <span class="logo-text">엔터핑</span>
            </div>
            <nav class="nav-links">
                <a href="typing_list.html">타이핑</a>
                <a href="quiz_list.html">퀴즈</a>
                <a href="battle_list.html" class="active">대전</a>
                <a href="ranking.html">랭킹</a>
                <a href="notice.html">공지</a>
            </nav>
        </div>
        <div class="nav-center">
            <div class="search-bar" onclick="location.href='search.html'">
                <span class="search-icon">🔍</span>
                <input type="text" placeholder="곡명, 아티스트 검색" readonly>
                <span class="shortcut">Enter</span>
            </div>
        </div>
        <div class="nav-right">
            <div class="auth-group">
                <button class="auth-login" onclick="location.href='login.html'">로그인</button>
                <button class="auth-signup" onclick="location.href='signup.html'">회원가입</button>
            </div>
        </div>
    </header>
    <script src="navbar.js?v=1.0.2"></script>

    <main class="content-section page-wrapper">
        <!-- Dashboard Layout Grid -->
        <div class="dashboard-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
            
            <!-- Top Left: 방 만들기 -->
            <div class="card" style="padding: 40px; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 200px;">
                <h2 style="margin-top: 0; color: var(--color-text-main); font-weight: 900; margin-bottom: 15px; font-size: 1.8rem; border-bottom: 4px solid var(--color-pink); padding-bottom: 8px; display: inline-block;">방 만들기</h2>
                <p style="color: var(--color-text-muted); margin-bottom: 25px; font-size: 1rem; word-break: keep-all;">새로운 공개 방을 만들거나, 방 코드를 생성해 방을 만들어보세요!</p>
                <button class="btn btn-create" style="width: 70%; font-size: 1.2rem; padding: 18px;" onclick="openCreateModal()">방 만들기</button>
            </div>

            <!-- Top Right: 방 코드 참여 -->
            <div class="card" style="padding: 40px; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 200px;">
                <h2 style="margin-top: 0; color: var(--color-text-main); font-weight: 900; margin-bottom: 15px; font-size: 1.8rem; border-bottom: 4px solid var(--color-pink); padding-bottom: 8px; display: inline-block;">방 코드 참여</h2>
                <p style="color: var(--color-text-muted); margin-bottom: 25px; font-size: 1rem; word-break: keep-all;">친구에게 코드를 받아 방에 참여해보세요!</p>
                <button class="btn btn-create" style="width: 70%; font-size: 1.2rem; padding: 18px; background: var(--color-blue); color: white;" onclick="openJoinCodeModal()">방 코드 참여</button>
            </div>
        </div>

        <!-- Bottom: 공개방 목록 -->
        <div class="card" style="padding: 35px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h2 style="margin: 0; color: var(--color-text-main); font-weight: 900; font-size: 1.8rem; border-bottom: 4px solid var(--color-pink); padding-bottom: 8px;">공개방 목록</h2>
                <button class="btn btn-refresh" onclick="fetchRooms()">새로고침</button>
            </div>
            <div class="card-grid" id="roomList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
                <!-- 방 목록이 여기에 동적으로 추가됩니다 -->
            </div>
        </div>
    </main>

    <!-- 방 만들기 모달 -->
    <div class="modal" id="createModal">
        <div class="modal-content">
            <h2>대전 방 만들기</h2>
            <div class="form-group">
                <label>방 제목</label>
                <input type="text" id="roomTitle" placeholder="예: 즐겁게 타자 칠 사람~">
            </div>
            <div class="form-group">
                <label>타이핑 콘텐츠 선택</label>
                <select id="contentSelect">
                    <!-- API에서 불러옴 -->
                </select>
            </div>
            <div class="form-group">
                <label>최대 인원수</label>
                <select id="maxPlayersSelect">
                    <option value="2">2명 (1 vs 1)</option>
                    <option value="3">3명</option>
                    <option value="4">4명</option>
                </select>
            </div>
            <div class="form-group" style="display: flex; align-items: center; gap: 12px; margin-top: 25px; background: #fff0f2; padding: 15px; border-radius: 12px; border: 1px solid rgba(255, 182, 193, 0.2);">
                <input type="checkbox" id="isPrivate" style="width: 22px; height: 22px; cursor: pointer; accent-color: var(--color-pink);" onchange="toggleRoomCodeField()">
                <label for="isPrivate" style="margin: 0; cursor: pointer; font-size: 1.1rem; color: var(--color-text-main);">비밀방 생성 (방 코드 필요)</label>
            </div>
            <div class="form-group" id="roomCodeGroup" style="display: none; margin-bottom: 25px; background: #fff0f2; border: 1px solid rgba(255, 182, 193, 0.3); padding: 20px; border-radius: 16px;">
                <label>방 코드 설정</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="createRoomCode" placeholder="코드를 입력/생성하세요" style="font-weight: 900; letter-spacing: 1px;">
                    <button class="btn btn-random" onclick="generateRandomCode()" style="white-space: nowrap;">랜덤 생성</button>
                    <button class="btn btn-blue" onclick="copyRoomCode()" style="white-space: nowrap; padding: 12px 15px; border-radius: 12px; background-color: #60a5fa; color: white; border: none; cursor: pointer; font-weight: bold;">복사</button>
                </div>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-cancel" onclick="closeCreateModal()">취소</button>
                <button class="btn btn-create" onclick="createRoom()">생성 및 입장</button>
            </div>
        </div>
    </div>

    <!-- 방 코드 참여 모달 -->
    <div class="modal" id="joinCodeModal">
        <div class="modal-content">
            <h2>방 코드 참여</h2>
            <div class="form-group">
                <label style="text-align: center; margin-bottom: 15px;">초대받은 비밀 방 코드를 입력하세요</label>
                <input type="text" id="joinRoomCode" class="code-input" placeholder="ABCD12" maxlength="12" style="font-size: 1.6rem; text-align: center; font-weight: 900; letter-spacing: 3px; padding: 20px;" onkeyup="if(event.key==='Enter') joinWithCode()">
            </div>
            <div class="modal-buttons">
                <button class="btn btn-cancel" onclick="closeJoinCodeModal()">취소</button>
                <button class="btn btn-create" style="background: var(--color-blue);" onclick="joinWithCode()">입장</button>
            </div>
        </div>
    </div>

    <script>
        // 로그인 체크
        const token = sessionStorage.getItem("ep_token");
        let fetchInterval = null;
        let contentsMap = {};

        window.onload = async () => {
            await loadContents();
            fetchRooms();
            fetchInterval = setInterval(fetchRooms, 3000); // 3초마다 갱신
        };

        // --- 모달 로직 ---
        function openCreateModal() {
            if (!token) {
                alert("로그인이 필요합니다.");
                location.href = "login.html";
                return;
            }
            document.getElementById("createModal").style.display = "flex";
            document.getElementById("isPrivate").checked = false;
            document.getElementById("roomCodeGroup").style.display = "none";
            document.getElementById("createRoomCode").value = "";
            document.getElementById("roomTitle").value = "";
        }

        function closeCreateModal() {
            document.getElementById("createModal").style.display = "none";
        }

        function openJoinCodeModal() {
            document.getElementById("joinCodeModal").style.display = "flex";
            document.getElementById("joinRoomCode").value = "";
            document.getElementById("joinRoomCode").focus();
        }

        function closeJoinCodeModal() {
            document.getElementById("joinCodeModal").style.display = "none";
        }

        async function joinWithCode() {
            const code = document.getElementById("joinRoomCode").value.trim();
            if (!code) return alert("방 코드를 입력해주세요.");
            if (!token) {
                alert("로그인이 필요합니다.");
                location.href = "login.html";
                return;
            }

            try {
                const res = await fetch("/api/battle/verify-code", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ room_code: code })
                });
                const data = await res.json();
                if (data.success) {
                    location.href = `battle.html?roomId=${data.room_id}`;
                } else {
                    alert(data.detail || "방 코드가 올바르지 않습니다.");
                }
            } catch (e) {
                console.error("코드 검증 중 오류 발생:", e);
                alert("코드 검증 중 오류가 발생했습니다.");
            }
        }
        
        // --- Room List Logic ---
        async function fetchRooms() {
            try {
                const res = await fetch("/api/battle/rooms");
                const data = await res.json();
                if (data.success) {
                    renderRooms(data.rooms);
                }
            } catch (e) {
                console.error("방 목록을 불러오지 못했습니다.", e);
            }
        }

        function renderRooms(rooms) {
            const grid = document.getElementById("roomList");
            grid.innerHTML = "";
            if (rooms.length === 0) {
                grid.innerHTML = "<div class='empty-state'>현재 생성된 공개 대전 방이 없습니다.<br>직접 첫 번째 방을 만들어보세요!</div>";
                return;
            }
            
            rooms.forEach(room => {
                const card = document.createElement("div");
                card.className = "room-card";
                card.onclick = () => joinRoom(room.id);
                
                let badgeClass = room.status === 'waiting' ? 'green' : 'pink';
                let statusText = room.status === 'waiting' ? '대기 중' : '게임 중';
                const content = contentsMap[room.content_id];
                const contentText = content ? `${content.title} - ${content.artist}` : "알 수 없는 곡";
                
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div class="card-badge ${badgeClass}">${statusText}</div>
                    </div>
                    <div class="room-card-title">${room.title}</div>
                    <div style="font-size: 0.95rem; color: var(--color-pink); font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 5px;">
                        <span>🎵</span> ${contentText}
                    </div>
                    <div class="room-card-desc">방장: <span style="color:var(--color-text-main); font-weight:600;">${room.creator}</span></div>
                    <div class="room-card-footer">
                        <span style="color:var(--color-text-muted); font-size:0.85rem;">참여 인원</span>
                        <span class="plays">${room.players.length} / ${room.max_players}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function loadContents() {
            try {
                const res = await fetch("/api/typing-contents");
                const data = await res.json();
                if (data.success) {
                    const select = document.getElementById("contentSelect");
                    select.innerHTML = "";
                    data.data.forEach(c => {
                        contentsMap[c.id] = c;
                        const opt = document.createElement("option");
                        opt.value = c.id;
                        opt.textContent = `${c.title} - ${c.artist}`;
                        select.appendChild(opt);
                    });
                }
            } catch (e) {
                console.error(e);
            }
        }

        function toggleRoomCodeField() {
            const isPrivate = document.getElementById("isPrivate").checked;
            const group = document.getElementById("roomCodeGroup");
            if (isPrivate) {
                group.style.display = "block";
                if (!document.getElementById("createRoomCode").value) {
                    generateRandomCode();
                }
            } else {
                group.style.display = "none";
            }
        }

        function generateRandomCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 6; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById("createRoomCode").value = code;
        }

        function copyRoomCode() {
            const codeInput = document.getElementById("createRoomCode");
            const code = codeInput.value.trim();
            if (!code) {
                alert("먼저 코드를 입력하거나 생성해주세요.");
                return;
            }
            navigator.clipboard.writeText(code).then(() => {
                alert("방 코드가 복사되었습니다! 친구들에게 공유해주세요. (" + code + ")");
            }).catch(err => {
                console.error("복사 실패:", err);
                codeInput.select();
                document.execCommand("copy");
                alert("방 코드가 복사되었습니다! (" + code + ")");
            });
        }

        async function createRoom() {
            const title = document.getElementById("roomTitle").value.trim();
            const contentId = document.getElementById("contentSelect").value;
            const maxPlayers = document.getElementById("maxPlayersSelect").value;
            const isPrivate = document.getElementById("isPrivate").checked;
            const roomCode = document.getElementById("createRoomCode").value.trim();
            
            if (!token) {
                alert("로그인이 필요합니다.");
                location.href = "login.html";
                return;
            }

            if (!title) return alert("방 제목을 입력하세요.");
            if (!contentId) return alert("콘텐츠를 선택하세요.");
            if (isPrivate && !roomCode) return alert("비밀방 코드를 입력하거나 생성하세요.");

            try {
                const res = await fetch("/api/battle/rooms", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        title: title,
                        content_id: parseInt(contentId),
                        max_players: parseInt(maxPlayers),
                        is_private: isPrivate,
                        room_code: isPrivate ? roomCode : null
                    })
                });
                const data = await res.json();
                if (data.success) {
                    if (isPrivate) {
                        alert(`방 코드는 [ ${roomCode} ] 입니다. 친구들에게 이 코드를 알려주세요!`);
                    }
                    location.href = `battle.html?roomId=${data.room.id}`;
                } else {
                    alert(data.detail || "방 생성 실패");
                }
            } catch (e) {
                console.error(e);
            }
        }

        function joinRoom(roomId) {
            if (!token) {
                alert("로그인이 필요합니다.");
                location.href = "login.html";
                return;
            }
            location.href = `battle.html?roomId=${roomId}`;
        }
    </script>
</body>
</html>
