<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 변경 - 엔터핑</title>
    <meta name="description" content="임시 비밀번호를 새 비밀번호로 변경하세요.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: var(--color-ivory);
            overflow-x: hidden;
        }

        .auth-page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 60px;
            position: relative;
        }

        .auth-page::before {
            content: '';
            position: fixed;
            top: -100px;
            right: -80px;
            width: 380px;
            height: 380px;
            border-radius: 50%;
            background: rgba(255, 182, 193, 0.16);
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        .auth-page::after {
            content: '';
            position: fixed;
            bottom: -100px;
            left: -80px;
            width: 380px;
            height: 380px;
            border-radius: 50%;
            background: rgba(173, 216, 230, 0.16);
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        /* 카드 */
        .auth-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 52px 48px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.07);
            border: 1px solid rgba(0, 0, 0, 0.04);
            position: relative;
            z-index: 1;
            animation: cardFadeIn 0.5s ease;
        }

        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 로고 */
        .auth-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--color-text-main);
            margin-bottom: 28px;
            justify-content: center;
            text-decoration: none;
        }

        .auth-logo .logo-icon {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border-radius: 50%;
            padding: 5px;
            font-size: 1.2rem;
        }

        /* 경고 뱃지 */
        .warning-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 152, 0, 0.1);
            border: 1px solid rgba(255, 152, 0, 0.3);
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 30px;
            font-size: 0.88rem;
            font-weight: 600;
            color: #e67e22;
            word-break: keep-all;
            line-height: 1.5;
        }

        .warning-badge .icon {
            font-size: 1.4rem;
            flex-shrink: 0;
        }

        /* 제목 */
        .auth-heading {
            font-size: 1.75rem;
            font-weight: 900;
            color: var(--color-text-main);
            margin-bottom: 8px;
            text-align: center;
        }

        .auth-subheading {
            font-size: 0.93rem;
            color: var(--color-text-muted);
            text-align: center;
            margin-bottom: 32px;
            font-weight: 500;
            line-height: 1.6;
        }

        /* 폼 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--color-text-main);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid var(--color-border);
            border-radius: 14px;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.97rem;
            color: var(--color-text-main);
            background-color: #fafafa;
            transition: border-color 0.2s, box-shadow 0.2s, background-color 0.2s;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--color-pink);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(255, 182, 193, 0.2);
        }

        .form-input::placeholder {
            color: #bbb;
            font-weight: 400;
        }

        .form-input.error {
            border-color: #e74c3c;
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.12);
        }

        .form-input.valid {
            border-color: #27ae60;
            box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.12);
        }

        .form-error {
            font-size: 0.82rem;
            color: #e74c3c;
            margin-top: 6px;
            display: none;
            font-weight: 600;
        }

        .form-error.visible {
            display: block;
        }

        .form-success {
            font-size: 0.82rem;
            color: #27ae60;
            margin-top: 6px;
            display: none;
            font-weight: 600;
        }

        .form-success.visible {
            display: block;
        }

        /* 비밀번호 강도 */
        .password-strength {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }

        .strength-bar {
            flex: 1;
            height: 4px;
            border-radius: 4px;
            background: #eee;
            transition: background-color 0.3s;
        }

        .strength-bar.weak {
            background: #e74c3c;
        }

        .strength-bar.medium {
            background: #f39c12;
        }

        .strength-bar.strong {
            background: #27ae60;
        }

        .strength-label {
            font-size: 0.78rem;
            color: #aaa;
            margin-top: 4px;
            font-weight: 600;
        }

        /* 규칙 체크리스트 */
        .rule-list {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .rule-item {
            font-size: 0.82rem;
            color: #bbb;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.25s;
        }

        .rule-item .rule-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ddd;
            flex-shrink: 0;
            transition: background 0.25s;
        }

        .rule-item.ok {
            color: #27ae60;
        }

        .rule-item.ok .rule-dot {
            background: #27ae60;
        }

        /* 버튼 */
        .btn-auth {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: none;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-auth-primary {
            background: linear-gradient(135deg, var(--color-pink) 0%, #FFD6DC 100%);
            color: #333;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.4);
        }

        .btn-auth-primary:hover {
            background: linear-gradient(135deg, var(--color-pink-hover) 0%, var(--color-pink) 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 182, 193, 0.5);
            color: #fff;
        }

        /* 성공 화면 */
        .success-panel {
            display: none;
            text-align: center;
        }

        .success-panel.active {
            display: block;
            animation: cardFadeIn 0.4s ease;
        }

        .success-icon {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4efdf 0%, #a9dfbf 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.6rem;
            margin: 0 auto 24px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from {
                transform: scale(0);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <!-- 네비게이션 -->
    <header class="navbar">
        <div class="nav-left">
            <div class="logo" onclick="location.href='index.html'">
                <span class="logo-icon"
                    style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); border-radius: 50%; padding: 4px; font-size: 1.2rem; margin-right: 5px;">🎵</span>
                <span class="logo-text">엔터핑</span>
            </div>
            <nav class="nav-links">
                <a href="typing_list.html">타이핑</a>
                <a href="quiz.html">퀴즈</a>
                <a href="ranking.html">랭킹</a>
                <a href="notice.html">공지</a>
            </nav>
        </div>
        <div class="nav-center">
            <div class="search-bar" onclick="location.href='search.html'">
                <span class="search-icon">🔍</span>
                <input type="text" placeholder="곡명, 아티스트 검색" readonly>
                <span class="shortcut">Enter</span>
            </div>
        </div>
        <div class="nav-right">
            <div class="auth-group">
                <button class="auth-login" onclick="location.href='login.html'">로그인</button>
                <button class="auth-signup" onclick="location.href='signup.html'">회원가입</button>
            </div>
        </div>
    </header>

    <main class="auth-page">
        <div class="auth-card">
            <!-- 로고 -->
            <a href="index.html" class="auth-logo">
                <span class="logo-icon">🎵</span>
                <span>엔터핑</span>
            </a>

            <!-- ── 변경 폼 ── -->
            <div id="changeForm-wrap">
                <!-- 경고 뱃지 -->
                <div class="warning-badge">
                    <span class="icon">🔒</span>
                    임시 비밀번호로 로그인되었습니다. 보안을 위해 지금 바로 새 비밀번호로 변경해주세요.
                </div>

                <h1 class="auth-heading">새 비밀번호 설정</h1>
                <p class="auth-subheading">이전 비밀번호와 다른 새 비밀번호를 입력해주세요.</p>

                <form id="changeForm" novalidate>
                    <!-- 새 비밀번호 -->
                    <div class="form-group">
                        <label class="form-label" for="new-password">새 비밀번호</label>
                        <input id="new-password" class="form-input" type="password" placeholder="영문, 숫자, 특수문자 포함 8자 이상"
                            autocomplete="new-password" required>
                        <div class="password-strength">
                            <div class="strength-bar" id="bar1"></div>
                            <div class="strength-bar" id="bar2"></div>
                            <div class="strength-bar" id="bar3"></div>
                            <div class="strength-bar" id="bar4"></div>
                        </div>
                        <p class="strength-label" id="strength-label"></p>
                        <!-- 규칙 체크리스트 -->
                        <div class="rule-list">
                            <div class="rule-item" id="rule-len">
                                <span class="rule-dot"></span>8자 이상
                            </div>
                            <div class="rule-item" id="rule-alpha">
                                <span class="rule-dot"></span>영문 포함
                            </div>
                            <div class="rule-item" id="rule-num">
                                <span class="rule-dot"></span>숫자 포함
                            </div>
                            <div class="rule-item" id="rule-spec">
                                <span class="rule-dot"></span>특수문자 포함 (권장)
                            </div>
                        </div>
                        <span class="form-error" id="pw-error">영문, 숫자를 포함하여 8자 이상 입력해주세요.</span>
                    </div>

                    <!-- 새 비밀번호 확인 -->
                    <div class="form-group">
                        <label class="form-label" for="new-password-confirm">새 비밀번호 확인</label>
                        <input id="new-password-confirm" class="form-input" type="password"
                            placeholder="새 비밀번호를 다시 입력하세요" autocomplete="new-password" required>
                        <span class="form-error" id="confirm-error">비밀번호가 일치하지 않습니다.</span>
                        <span class="form-success" id="confirm-success">비밀번호가 일치합니다 ✓</span>
                    </div>

                    <button type="submit" id="change-btn" class="btn-auth btn-auth-primary">
                        비밀번호 변경하기
                    </button>
                </form>
            </div>

            <!-- ── 변경 완료 화면 ── -->
            <div class="success-panel" id="success-wrap">
                <div class="success-icon">🎉</div>
                <h1 class="auth-heading">변경 완료!</h1>
                <p class="auth-subheading" style="margin-bottom: 32px;">
                    비밀번호가 성공적으로 변경되었습니다.<br>새 비밀번호로 다시 로그인해주세요.
                </p>
                <button class="btn-auth btn-auth-primary" onclick="location.href='login.html'">
                    로그인하러 가기
                </button>
            </div>
        </div>
    </main>

    <script>
        // ─── 이메일 복원 (sessionStorage) ────────────────────
        const changeEmail = sessionStorage.getItem('change_pw_email') || '';
        if (!changeEmail) {
            // 직접 접근 방지: 이메일 정보 없으면 로그인 페이지로
            location.href = 'login.html';
        }

        // ─── 비밀번호 강도 ────────────────────────────────────
        function getStrength(pw) {
            let score = 0;
            if (pw.length >= 8) score++;
            if (/[a-zA-Z]/.test(pw)) score++;
            if (/[0-9]/.test(pw)) score++;
            if (/[^a-zA-Z0-9]/.test(pw)) score++;
            return score;
        }

        document.getElementById('new-password').addEventListener('input', function () {
            const pw = this.value;
            const score = getStrength(pw);
            const bars = ['bar1', 'bar2', 'bar3', 'bar4'].map(id => document.getElementById(id));
            const colors = ['', 'weak', 'medium', 'strong', 'strong'];
            const lbls = ['', '약함', '보통', '강함', '매우 강함'];

            bars.forEach((b, i) => {
                b.className = 'strength-bar';
                if (i < score && pw.length > 0) b.classList.add(colors[score]);
            });
            document.getElementById('strength-label').textContent = pw.length > 0 ? lbls[score] : '';

            // 규칙 체크
            toggle('rule-len', pw.length >= 8);
            toggle('rule-alpha', /[a-zA-Z]/.test(pw));
            toggle('rule-num', /[0-9]/.test(pw));
            toggle('rule-spec', /[^a-zA-Z0-9]/.test(pw));

            checkMatch();
        });

        function toggle(id, ok) {
            const el = document.getElementById(id);
            el.classList.toggle('ok', ok);
        }

        // ─── 비밀번호 일치 확인 ───────────────────────────────
        function checkMatch() {
            const pw = document.getElementById('new-password').value;
            const cpw = document.getElementById('new-password-confirm').value;
            const input = document.getElementById('new-password-confirm');
            const errEl = document.getElementById('confirm-error');
            const okEl = document.getElementById('confirm-success');

            if (cpw === '') {
                input.classList.remove('error', 'valid');
                errEl.classList.remove('visible');
                okEl.classList.remove('visible');
                return;
            }
            if (pw === cpw) {
                input.classList.replace('error', 'valid') || input.classList.add('valid');
                input.classList.remove('error');
                errEl.classList.remove('visible');
                okEl.classList.add('visible');
            } else {
                input.classList.add('error');
                input.classList.remove('valid');
                okEl.classList.remove('visible');
                errEl.classList.add('visible');
            }
        }

        document.getElementById('new-password-confirm').addEventListener('input', checkMatch);

        // ─── 폼 제출 ──────────────────────────────────────────
        document.getElementById('changeForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            let valid = true;

            const pw = document.getElementById('new-password').value;
            const cpw = document.getElementById('new-password-confirm').value;
            const pwInput = document.getElementById('new-password');
            const pwError = document.getElementById('pw-error');
            const changeBtn = document.getElementById('change-btn');

            // 비밀번호 규칙 검사
            const pwOk = /[a-zA-Z]/.test(pw) && /[0-9]/.test(pw) && pw.length >= 8;
            if (!pwOk) {
                pwInput.classList.add('error');
                pwError.classList.add('visible');
                valid = false;
            } else {
                pwInput.classList.remove('error');
                pwError.classList.remove('visible');
            }

            // 일치 확인
            if (pw !== cpw) valid = false;

            if (!valid) return;

            changeBtn.disabled = true;
            changeBtn.textContent = '변경 중...';

            try {
                const res = await fetch('/api/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: changeEmail, new_password: pw })
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    sessionStorage.removeItem('change_pw_email'); // 세션 정리
                    showSuccess();
                } else {
                    pwError.textContent = data.detail || '비밀번호 변경에 실패했습니다. 다시 시도해주세요.';
                    pwError.classList.add('visible');
                }
            } catch (err) {
                pwError.textContent = '서버에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.';
                pwError.classList.add('visible');
            } finally {
                changeBtn.disabled = false;
                changeBtn.textContent = '비밀번호 변경하기';
            }
        });

        function showSuccess() {
            document.getElementById('changeForm-wrap').style.display = 'none';
            const successWrap = document.getElementById('success-wrap');
            successWrap.classList.add('active');
        }
    </script>
</body>

</html>
