<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 대전 - 엔터핑</title>
    <link rel="stylesheet" href="/style.css?v=1.0.3">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <style>
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-box {
            width: 100%; max-width: 420px; background: var(--theme-bg-card);
            border-radius: 24px; padding: 36px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            position: relative; transform: translateY(20px); transition: transform 0.3s ease;
        }
        .modal-overlay.show .modal-box { transform: translateY(0); }
        .modal-close-btn {
            position: absolute; top: 16px; right: 20px; background: transparent;
            border: none; font-size: 1.6rem; cursor: pointer; color: #aaa; transition: color 0.2s;
        }
        .modal-close-btn:hover { color: var(--theme-text-main); }
        .modal-box h3 { font-size: 1.3rem; font-weight: 900; margin-bottom: 24px; color: var(--theme-text-main); }
        .form-row { margin-bottom: 18px; text-align: left; }
        .form-row label { display: block; font-size: 0.88rem; font-weight: 700; color: var(--theme-text-muted); margin-bottom: 8px; }
        .form-row input[type="text"], .form-row input[type="password"], .form-row select {
            width: 100%; padding: 12px 16px; font-size: 1rem; border-radius: 12px;
            border: 1.5px solid var(--theme-border); background: var(--theme-bg-main);
            color: var(--theme-text-main); box-sizing: border-box; outline: none;
        }
        .form-row-checkbox { display: flex; align-items: center; gap: 10px; }
        .form-row-checkbox input { width: 18px; height: 18px; cursor: pointer; }
        .form-row-checkbox label { margin: 0; cursor: pointer; }

        .room-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; width: 100%;
        }
        .room-card {
            background: var(--theme-bg-card); border: 1.5px solid var(--theme-border);
            border-radius: 18px; padding: 20px; cursor: pointer; transition: all 0.2s;
        }
        .room-card:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.1); border-color: var(--color-pink); }
        .room-card.locked { opacity: 0.55; filter: grayscale(0.4); }
        .room-card.locked:hover { transform: none; box-shadow: none; border-color: var(--theme-border); }
        .room-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .room-card-title { font-weight: 900; font-size: 1.05rem; color: var(--theme-text-main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .room-card-meta { font-size: 0.88rem; color: var(--theme-text-muted); margin-bottom: 14px; }
        .room-card-footer { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; font-weight: 700; }
        .room-card-status { padding: 3px 10px; border-radius: 8px; background: rgba(108,63,232,0.12); color: #6C3FE8; }
        .room-card-status.playing { background: rgba(255,143,171,0.15); color: #ff6f91; }
        .empty-rooms { grid-column: 1 / -1; text-align: center; padding: 60px 0; color: var(--theme-text-muted); font-weight: 600; }
    </style>

    <script>
        if (localStorage.getItem('ep_theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <!-- 상단 네비게이션 바 -->
    <header class="navbar">
        <div class="nav-left">
            <div class="logo" onclick="location.href='/'">
                <img src="/assets/logo_icon.png" alt="엔터핑 아이콘" class="logo-img">
                <span class="logo-text">엔터핑</span>
            </div>
            <nav class="nav-links">
                <a href="/typing">타이핑</a>
                <a href="/quiz">퀴즈</a>
                <a href="/ranking">랭킹</a>
                <a href="/battle" class="active">실시간 대전</a>
            </nav>
        </div>
        <div class="nav-center">
            <div class="search-bar" onclick="location.href='/search'">
                <span class="search-icon"><i class="ph-bold ph-magnifying-glass"></i></span>
                <input type="text" placeholder="곡명, 아티스트 검색" readonly>
                <span class="shortcut">Enter</span>
            </div>
        </div>
        <div class="nav-right">
            <a href="/notice" class="nav-notice-link"
                style="margin-right: 20px; text-decoration: none; color: var(--theme-text-muted); font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; transition: all 0.2s;"
                onmouseover="this.style.color='var(--color-pink)'; this.style.backgroundColor='rgba(255, 182, 193, 0.15)';"
                onmouseout="this.style.color='var(--theme-text-muted)'; this.style.backgroundColor='transparent';"><i class="ph-fill ph-bell"></i>
                공지</a>
            <div class="auth-group">
                <button class="auth-login" onclick="location.href='/login'">로그인</button>
                <button class="auth-signup" onclick="location.href='/signup'">회원가입</button>
            </div>
        </div>
    </header>

    <script src="/navbar.js?v=2.0.0"></script>

    <!-- 메인 컨텐츠 -->
    <main style="margin-top: 80px; flex: 1; padding: 0 40px; display: flex; flex-direction: column; align-items: center;">
        <section class="content-section" style="padding-top: 40px; width: 100%; max-width: 1200px;">
            <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <div>
                    <h2>⌨️ 실시간 타이핑 대전</h2>
                    <p style="color: var(--theme-text-muted); margin-top: 8px; font-weight: 500;">참가할 방을 고르거나, 새 방을 직접 만들어보세요!</p>
                </div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="join-code-input" placeholder="코드 4자리" maxlength="4"
                        style="padding: 10px 16px; border-radius: 30px; border: 1.5px solid var(--theme-border); width: 130px; text-align: center; font-weight: 800; letter-spacing: 3px; background: var(--theme-bg-card); color: var(--theme-text-main);"
                        onkeydown="if(event.key==='Enter') joinByCode()">
                    <button class="btn btn-outline" style="border-radius: 30px; padding: 10px 22px;" onclick="joinByCode()">코드 참가</button>
                    <button class="btn btn-pink" style="border-radius: 30px; padding: 10px 22px;" onclick="openCreateModal()">
                        <span style="font-size: 1.3rem; font-weight: bold; line-height: 1;">+</span> 방 만들기
                    </button>
                </div>
            </div>

            <div class="room-grid" id="room-grid">
                <div class="empty-rooms">방 목록을 불러오는 중...</div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-container">
            <div class="footer-col brand-col">
                <div class="footer-logo">
                    <img src="/assets/logo_icon.png" alt="엔터핑 아이콘" style="height:32px;width:auto;">
                    <span class="logo-text">엔터핑</span>
                </div>
                <p class="footer-desc">일본 문화 콘텐츠를 통해 자연스럽게 언어를 익히는 즐거운 타이핑 플랫폼</p>
            </div>
            <div class="footer-col">
                <h4>타이핑 & 퀴즈</h4>
                <ul>
                    <li><a href="/typing">타이핑 리스트</a></li>
                    <li><a href="/typing/create">타이핑 작성</a></li>
                    <li><a href="/quiz">퀴즈 리스트</a></li>
                    <li><a href="/quiz/create">퀴즈 작성</a></li>
                </ul>
            </div>
            <div class="footer-col">
                <h4>실시간 & 랭킹</h4>
                <ul>
                    <li><a href="/battle">실시간 대전</a></li>
                    <li><a href="/ranking">전체 랭킹</a></li>
                    <li><a href="/ranking/songs">곡별 랭킹</a></li>
                </ul>
            </div>
        </div>
    </footer>

    <!-- 방 만들기 모달 -->
    <div class="modal-overlay" id="modal-create-room">
        <div class="modal-box">
            <button class="modal-close-btn" onclick="closeCreateModal()">&times;</button>
            <h3>대전방 만들기</h3>
            <div class="form-row">
                <label>방 제목</label>
                <input type="text" id="create-title" placeholder="예: 초보 환영! 같이 쳐요" maxlength="40">
            </div>
            <div class="form-row">
                <label>최대 인원</label>
                <select id="create-max-players">
                    <option value="4">4명 (최대)</option>
                    <option value="3">3명</option>
                    <option value="2">2명</option>
                </select>
            </div>
            <div class="form-row form-row-checkbox">
                <input type="checkbox" id="create-is-private" onchange="onPrivateToggle()">
                <label for="create-is-private">비밀방으로 만들기</label>
            </div>
            <div class="form-row" id="create-password-row" style="display: none;">
                <label>비밀번호</label>
                <input type="password" id="create-password" placeholder="입장 비밀번호">
            </div>
            <button class="btn btn-pink" style="width: 100%; padding: 14px; border-radius: 12px; margin-top: 8px;" onclick="submitCreateRoom()">방 생성 및 코드 발급</button>
        </div>
    </div>

    <!-- 비밀번호 입력 모달 -->
    <div class="modal-overlay" id="modal-password">
        <div class="modal-box">
            <button class="modal-close-btn" onclick="closePasswordModal()">&times;</button>
            <h3>🔒 비밀방 입장</h3>
            <div class="form-row">
                <label>비밀번호</label>
                <input type="password" id="join-password" placeholder="방 비밀번호를 입력하세요" onkeydown="if(event.key==='Enter') submitPassword()">
            </div>
            <button class="btn btn-pink" style="width: 100%; padding: 14px; border-radius: 12px; margin-top: 8px;" onclick="submitPassword()">입장하기</button>
        </div>
    </div>

  <script src="/js/battle/list.js"></script>

    <script src="/i18n.js"></script>
</body>
</html>
