<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 변경 - 엔터핑</title>
    <meta name="description" content="임시 비밀번호를 새 비밀번호로 변경하세요.">
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: var(--color-ivory);
            overflow-x: hidden;
        }

        .auth-page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 60px;
            position: relative;
        }

        .auth-page::before {
            content: '';
            position: fixed;
            top: -100px;
            right: -80px;
            width: 380px;
            height: 380px;
            border-radius: 50%;
            background: rgba(255, 182, 193, 0.16);
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        .auth-page::after {
            content: '';
            position: fixed;
            bottom: -100px;
            left: -80px;
            width: 380px;
            height: 380px;
            border-radius: 50%;
            background: rgba(173, 216, 230, 0.16);
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        /* 카드 */
        .auth-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 52px 48px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.07);
            border: 1px solid rgba(0, 0, 0, 0.04);
            position: relative;
            z-index: 1;
            animation: cardFadeIn 0.5s ease;
        }

        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 로고 */
        .auth-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--color-text-main);
            margin-bottom: 28px;
            justify-content: center;
            text-decoration: none;
        }

        .auth-logo .logo-icon {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border-radius: 50%;
            padding: 5px;
            font-size: 1.2rem;
        }

        /* 경고 뱃지 */
        .warning-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 152, 0, 0.1);
            border: 1px solid rgba(255, 152, 0, 0.3);
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 30px;
            font-size: 0.88rem;
            font-weight: 600;
            color: #e67e22;
            word-break: keep-all;
            line-height: 1.5;
        }

        .warning-badge .icon {
            font-size: 1.4rem;
            flex-shrink: 0;
        }

        /* 제목 */
        .auth-heading {
            font-size: 1.75rem;
            font-weight: 900;
            color: var(--color-text-main);
            margin-bottom: 8px;
            text-align: center;
        }

        .auth-subheading {
            font-size: 0.93rem;
            color: var(--color-text-muted);
            text-align: center;
            margin-bottom: 32px;
            font-weight: 500;
            line-height: 1.6;
        }

        /* 폼 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--color-text-main);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid var(--color-border);
            border-radius: 14px;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.97rem;
            color: var(--color-text-main);
            background-color: #fafafa;
            transition: border-color 0.2s, box-shadow 0.2s, background-color 0.2s;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--color-pink);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(255, 182, 193, 0.2);
        }

        .form-input::placeholder {
            color: #bbb;
            font-weight: 400;
        }

        .form-input.error {
            border-color: #e74c3c;
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.12);
        }

        .form-input.valid {
            border-color: #27ae60;
            box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.12);
        }

        .form-error {
            font-size: 0.82rem;
            color: #e74c3c;
            margin-top: 6px;
            display: none;
            font-weight: 600;
        }

        .form-error.visible {
            display: block;
        }

        .form-success {
            font-size: 0.82rem;
            color: #27ae60;
            margin-top: 6px;
            display: none;
            font-weight: 600;
        }

        .form-success.visible {
            display: block;
        }

        /* 비밀번호 강도 */
        .password-strength {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }

        .strength-bar {
            flex: 1;
            height: 4px;
            border-radius: 4px;
            background: #eee;
            transition: background-color 0.3s;
        }

        .strength-bar.weak {
            background: #e74c3c;
        }

        .strength-bar.medium {
            background: #f39c12;
        }

        .strength-bar.strong {
            background: #27ae60;
        }

        .strength-label {
            font-size: 0.78rem;
            color: #aaa;
            margin-top: 4px;
            font-weight: 600;
        }

        /* 규칙 체크리스트 */
        .rule-list {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .rule-item {
            font-size: 0.82rem;
            color: #bbb;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.25s;
        }

        .rule-item .rule-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ddd;
            flex-shrink: 0;
            transition: background 0.25s;
        }

        .rule-item.ok {
            color: #27ae60;
        }

        .rule-item.ok .rule-dot {
            background: #27ae60;
        }

        /* 버튼 */
        .btn-auth {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: none;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-auth-primary {
            background: linear-gradient(135deg, var(--color-pink) 0%, #FFD6DC 100%);
            color: var(--theme-text-main);
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.4);
        }

        .btn-auth-primary:hover {
            background: linear-gradient(135deg, var(--color-pink-hover) 0%, var(--color-pink) 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 182, 193, 0.5);
            color: #fff;
        }

        /* 성공 화면 */
        .success-panel {
            display: none;
            text-align: center;
        }

        .success-panel.active {
            display: block;
            animation: cardFadeIn 0.4s ease;
        }

        .success-icon {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4efdf 0%, #a9dfbf 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.6rem;
            margin: 0 auto 24px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from {
                transform: scale(0);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* 다크모드 대응 */
        [data-theme="dark"] body {
            background-color: var(--theme-bg-main);
        }

        [data-theme="dark"] .auth-card {
            background: var(--theme-bg-card);
            border: 1px solid var(--theme-border);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.2);
        }

        [data-theme="dark"] .auth-logo,
        [data-theme="dark"] .auth-heading,
        [data-theme="dark"] .form-label,
        [data-theme="dark"] .form-input,
        [data-theme="dark"] .btn-social {
            color: var(--theme-text-main);
        }

        [data-theme="dark"] .auth-subheading,
        [data-theme="dark"] .form-extras a,
        [data-theme="dark"] .auth-footer-text,
        [data-theme="dark"] .form-input::placeholder,
        [data-theme="dark"] .divider span {
            color: var(--theme-text-muted);
        }

        [data-theme="dark"] .form-input {
            background-color: rgba(0, 0, 0, 0.2);
            border-color: var(--theme-border);
        }

        [data-theme="dark"] .form-input:focus {
            background-color: rgba(0, 0, 0, 0.4);
            border-color: var(--color-pink);
        }

        [data-theme="dark"] .btn-social {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: var(--theme-border);
        }

        [data-theme="dark"] .btn-social:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        [data-theme="dark"] .auth-page::before {
            background: rgba(59, 130, 246, 0.15);
        }

        [data-theme="dark"] .auth-page::after {
            background: rgba(14, 165, 233, 0.15);
        }
    </style>

    <script>
        if (localStorage.getItem('ep_theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <!-- 네비게이션 -->
    <header class="navbar">
        <div class="nav-left">
            <div class="logo" onclick="location.href='/'">
                <span class="logo-icon"
                    style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); border-radius: 50%; padding: 4px; font-size: 1.2rem; margin-right: 5px;"></span>
                <span class="logo-text">엔터핑</span>
            </div>
            <nav class="nav-links">
                <a href="/typing">타이핑</a>
                <a href="/quiz">퀴즈</a>
                <a href="/ranking">랭킹</a>
                <a href="/battle">실시간 대전</a>
            </nav>
        </div>
        <div class="nav-center">
            <div class="search-bar" onclick="location.href='/search'">
                <span class="search-icon"><i class="ph-bold ph-magnifying-glass"></i></span>
                <input type="text" placeholder="곡명, 아티스트 검색" readonly>
                <span class="shortcut">Enter</span>
            </div>
        </div>
        <div class="nav-right">
            <a href="/notice" class="nav-notice-link" style="margin-right: 20px; text-decoration: none; color: var(--color-text-muted); font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; transition: all 0.2s;" onmouseover="this.style.color='var(--color-pink)'; this.style.backgroundColor='rgba(255, 182, 193, 0.15)';" onmouseout="this.style.color='var(--color-text-muted)'; this.style.backgroundColor='transparent';"><i class="ph-fill ph-bell"></i> 공지</a>
            <div class="auth-group">
                <button class="auth-login" onclick="location.href='/login'">로그인</button>
                <button class="auth-signup" onclick="location.href='/signup'">회원가입</button>
            </div>
        </div>
    </header>

    <main class="auth-page">
        <div class="auth-card">
            <!-- 로고 -->
            <a href="/" class="auth-logo">
                <span class="logo-icon"></span>
                <span>엔터핑</span>
            </a>

            <!-- ── 변경 폼 ── -->
            <div id="changeForm-wrap">
                <!-- 경고 뱃지 -->
                <div class="warning-badge">
                    <span class="icon"></span>
                    임시 비밀번호로 로그인되었습니다. 보안을 위해 지금 바로 새 비밀번호로 변경해주세요.
                </div>

                <h1 class="auth-heading">새 비밀번호 설정</h1>
                <p class="auth-subheading">이전 비밀번호와 다른 새 비밀번호를 입력해주세요.</p>

                <form id="changeForm" novalidate>
                    <!-- 새 비밀번호 -->
                    <div class="form-group">
                        <label class="form-label" for="new-password">새 비밀번호</label>
                        <input id="new-password" class="form-input" type="password" placeholder="영문, 숫자, 특수문자 포함 8자 이상"
                            autocomplete="new-password" required>
                        <div class="password-strength">
                            <div class="strength-bar" id="bar1"></div>
                            <div class="strength-bar" id="bar2"></div>
                            <div class="strength-bar" id="bar3"></div>
                            <div class="strength-bar" id="bar4"></div>
                        </div>
                        <p class="strength-label" id="strength-label"></p>
                        <!-- 규칙 체크리스트 -->
                        <div class="rule-list">
                            <div class="rule-item" id="rule-len">
                                <span class="rule-dot"></span>8자 이상
                            </div>
                            <div class="rule-item" id="rule-alpha">
                                <span class="rule-dot"></span>영문 포함
                            </div>
                            <div class="rule-item" id="rule-num">
                                <span class="rule-dot"></span>숫자 포함
                            </div>
                            <div class="rule-item" id="rule-spec">
                                <span class="rule-dot"></span>특수문자 포함 (권장)
                            </div>
                        </div>
                        <span class="form-error" id="pw-error">영문, 숫자를 포함하여 8자 이상 입력해주세요.</span>
                    </div>

                    <!-- 새 비밀번호 확인 -->
                    <div class="form-group">
                        <label class="form-label" for="new-password-confirm">새 비밀번호 확인</label>
                        <input id="new-password-confirm" class="form-input" type="password"
                            placeholder="새 비밀번호를 다시 입력하세요" autocomplete="new-password" required>
                        <span class="form-error" id="confirm-error">비밀번호가 일치하지 않습니다.</span>
                        <span class="form-success" id="confirm-success">비밀번호가 일치합니다 ✓</span>
                    </div>

                    <button type="submit" id="change-btn" class="btn-auth btn-auth-primary">
                        비밀번호 변경하기
                    </button>
                </form>
            </div>

            <!-- ── 변경 완료 화면 ── -->
            <div class="success-panel" id="success-wrap">
                <div class="success-icon"></div>
                <h1 class="auth-heading">변경 완료!</h1>
                <p class="auth-subheading" style="margin-bottom: 32px;">
                    비밀번호가 성공적으로 변경되었습니다.<br>새 비밀번호로 다시 로그인해주세요.
                </p>
                <button class="btn-auth btn-auth-primary" onclick="location.href='/login'">
                    로그인하러 가기
                </button>
            </div>
        </div>
    </main>

    <script src="/js/auth/change_password.js"></script>
    <script src="/i18n.js"></script>
</body>

</html>
