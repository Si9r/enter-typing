<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이지 준비중 - 엔터핑</title>
    <link rel="stylesheet" href="/style.css?v=1.0.4">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script>
        if (localStorage.getItem('ep_theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--theme-bg-main);
            color: var(--theme-text-main);
            font-family: 'Noto Sans KR', sans-serif;
            text-align: center;
        }
        .mockup-container {
            background: var(--theme-bg-card);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--theme-border);
            max-width: 450px;
            width: 90%;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 15px;
            color: var(--color-pink);
        }
        p {
            font-size: 1.1rem;
            color: var(--theme-text-muted);
            line-height: 1.6;
            margin-bottom: 30px;
            word-break: keep-all;
        }
        .close-btn {
            background-color: var(--theme-bg-hover);
            color: var(--theme-text-main);
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .close-btn:hover {
            background-color: var(--color-pink);
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="mockup-container">
        <div class="icon">🚧</div>
        <h1>페이지 준비중입니다</h1>
        <p>현재 연동 기능을 준비하고 있습니다.<br>빠른 시일 내에 멋진 서비스로 찾아뵙겠습니다!</p>
        <button class="close-btn" onclick="window.close()">창 닫기</button>
    </div>

    <!-- 다국어 지원 스크립트 -->
    <script src="/i18n.js"></script>
</body>
</html>
