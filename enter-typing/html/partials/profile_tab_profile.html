    <!-- 탭 1: 프로필 & 뱃지 -->
    <div class="tab-panel active" id="tab-profile">
      <div class="stats-row">
        <div class="stat-box">
          <div class="num" id="stat-total-plays">-</div>
          <div class="lbl">총 플레이 수</div>
        </div>
        <div class="stat-box">
          <div class="num" id="stat-avg-accuracy">-<small style="font-size:1rem;">%</small></div>
          <div class="lbl">평균 정확도</div>
        </div>
        <div class="stat-box">
          <div class="num" id="stat-max-wpm">-</div>
          <div class="lbl">최고 WPM</div>
        </div>
      </div>
      <div class="badges-section">
        <h3><span style="margin-right:4px;">🏅</span>획득한 뱃지</h3>

        <style>
          .badge-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
          }
          .badge-item {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 24px 12px 20px;
            border-radius: 18px;
            background: var(--theme-bg-hover);
            border: 2px solid var(--theme-border);
            transition: all .25s;
            min-height: 120px;
            cursor: default;
          }
          .badge-item.earned {
            border-color: #FFB6C1;
            background: linear-gradient(135deg, rgba(255,182,193,.12), rgba(173,216,230,.12));
          }
          .badge-item.earned:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(255,182,193,.35);
          }
          .badge-item.locked {
            opacity: .65;
          }
          .badge-item.locked:hover {
            opacity: .85;
            transform: translateY(-2px);
          }
          .badge-icon {
            font-size: 2.6rem;
            line-height: 1;
            filter: none;
          }
          .badge-item.locked .badge-icon {
            filter: grayscale(1);
            opacity: .45;
          }
          .badge-name {
            font-size: .82rem;
            font-weight: 700;
            color: var(--theme-text-main);
            text-align: center;
            word-break: keep-all;
            line-height: 1.3;
          }
          .badge-item.locked .badge-name { color: #aaa; }

          /* 툴팁 */
          .badge-tooltip {
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
            position: absolute;
            bottom: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30,30,40,.92);
            color: #fff;
            font-size: .78rem;
            font-weight: 600;
            line-height: 1.45;
            padding: 8px 12px;
            border-radius: 10px;
            white-space: nowrap;
            z-index: 100;
            transition: opacity .18s ease, visibility .18s ease;
            box-shadow: 0 4px 14px rgba(0,0,0,.25);
          }
          .badge-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: rgba(30,30,40,.92);
          }
          .badge-item:hover .badge-tooltip {
            visibility: visible;
            opacity: 1;
          }
        </style>

        <div class="badge-grid" id="badge-grid">
          <div class="badge-item locked" id="badge-passion">
            <div class="badge-icon">⌨️</div>
            <div class="badge-name">타이핑 열정왕</div>
            <div class="badge-tooltip">타이핑 누적 50회 달성</div>
          </div>
          <div class="badge-item locked" id="badge-speed">
            <div class="badge-icon">⚡</div>
            <div class="badge-name">스피드스타</div>
            <div class="badge-tooltip">최고 WPM 200 이상 달성</div>
          </div>
          <div class="badge-item locked" id="badge-accuracy">
            <div class="badge-icon">🎯</div>
            <div class="badge-name">정확도 달인</div>
            <div class="badge-tooltip">평균 정확도 98% 이상</div>
          </div>
          <div class="badge-item locked" id="badge-attendance">
            <div class="badge-icon">📅</div>
            <div class="badge-name">7일 연속 출석</div>
            <div class="badge-tooltip">7일 연속으로 출석 체크</div>
          </div>
          <div class="badge-item locked" id="badge-jpop">
            <div class="badge-icon">🎵</div>
            <div class="badge-name">JPOP 마니아</div>
            <div class="badge-tooltip">일본 곡 타이핑 30회 달성</div>
          </div>
          <div class="badge-item locked" id="badge-ranking">
            <div class="badge-icon">🏆</div>
            <div class="badge-name">랭킹 TOP 10</div>
            <div class="badge-tooltip">종합 랭킹 TOP 10 진입</div>
          </div>
          <div class="badge-item locked" id="badge-diamond">
            <div class="badge-icon">💎</div>
            <div class="badge-name">다이아 유저</div>
            <div class="badge-tooltip">총 플레이 수 100회 달성</div>
          </div>
          <div class="badge-item locked" id="badge-attendance30">
            <div class="badge-icon">🗓️</div>
            <div class="badge-name">30일 개근</div>
            <div class="badge-tooltip">한 달 동안 30일 출석 체크</div>
          </div>
          <div class="badge-item locked" id="badge-king">
            <div class="badge-icon">👑</div>
            <div class="badge-name">랭킹 1위</div>
            <div class="badge-tooltip">종합 랭킹 1위 달성</div>
          </div>
          <div class="badge-item locked" id="badge-battle">
            <div class="badge-icon">⚔️</div>
            <div class="badge-name">배틀 100승</div>
            <div class="badge-tooltip">실시간 대전 100승 달성</div>
          </div>
        </div>
      </div>
    </div>
