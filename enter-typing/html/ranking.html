<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>명예의 전당 - 종합 랭킹</title>
    <link rel="stylesheet" href="/style.css?v=1.0.4">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        .ranking-container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        .ranking-header { text-align: center; margin-bottom: 40px; }
        .ranking-tabs { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .tab-btn { padding: 12px 30px; font-size: 1.1rem; font-weight: 700; border: 1px solid var(--theme-border); background: var(--theme-bg-card); border-radius: 30px; cursor: pointer; transition: all 0.3s; color: var(--theme-text-sub); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .tab-btn.active { background: linear-gradient(135deg, var(--color-pink), var(--color-blue)); border-color: transparent; color: white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transform: translateY(-2px); }
        .ranking-list { background: var(--theme-bg-card); border: 1px solid var(--theme-border); border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); backdrop-filter: blur(10px); }
        .rank-item { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid var(--theme-border); transition: background 0.2s; border-radius: 10px; }
        .rank-item:hover { background: var(--theme-bg-hover); transform: scale(1.01); box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-bottom-color: transparent; }
        .rank-number { font-size: 1.5rem; font-weight: 900; width: 60px; text-align: center; color: var(--theme-text-muted); }
        .rank-1 .rank-number { color: #FFD700; font-size: 2rem; }
        .rank-2 .rank-number { color: #C0C0C0; font-size: 1.8rem; }
        .rank-3 .rank-number { color: #CD7F32; font-size: 1.7rem; }
        .rank-avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--color-pink); color: white; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; font-weight: 700; margin-right: 20px; }
        .rank-info { flex: 1; }
        .rank-name { font-size: 1.2rem; font-weight: 700; color: var(--theme-text-main); margin-bottom: 5px; }
        .rank-stats { font-size: 0.9rem; color: var(--theme-text-sub); display: flex; gap: 15px; }
        .rank-score { font-size: 1.3rem; font-weight: 900; color: var(--color-blue); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <script>
        if (localStorage.getItem('ep_theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <!-- 상단 네비게이션 바 -->
    <header class="navbar">
        <div class="nav-left">
            <div class="logo" onclick="location.href='/'">
                <img src="/assets/logo_icon.png" alt="엔터핑 아이콘" class="logo-img">
                <span class="logo-text">엔터핑</span>
            </div>
            <nav class="nav-links">
                <a href="/typing">타이핑</a>
                <a href="/quiz">퀴즈</a>
                <a href="/ranking" style="color: var(--color-pink); font-weight: 700;">랭킹</a>
                <a href="/battle">실시간 대전</a>
            </nav>
        </div>
        <div class="nav-center">
            <div class="search-bar">
                <span class="search-icon"><i class="ph-bold ph-magnifying-glass"></i></span>
                <input type="text" id="search-input-field" placeholder="곡명, 아티스트 검색" readonly>
                <span class="shortcut">Enter</span>
            </div>
        </div>
        <div class="nav-right">
            <a href="/notice" class="nav-notice-link" style="margin-right: 20px; text-decoration: none; color: var(--color-text-muted); font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; transition: all 0.2s;" onmouseover="this.style.color='var(--color-pink)'; this.style.backgroundColor='rgba(255, 182, 193, 0.15)';" onmouseout="this.style.color='var(--color-text-muted)'; this.style.backgroundColor='transparent';"><i class="ph-fill ph-bell"></i> 공지</a>
            <div class="auth-group">
                <button class="auth-login" onclick="location.href='/login'">로그인</button>
                <button class="auth-signup" onclick="location.href='/signup'">회원가입</button>
            </div>
        </div>
    </header>

    <script src="/navbar.js?v=2.0.0"></script>

    <!-- 메인 컨텐츠 -->
    <main style="margin-top: 80px; min-height: 70vh;">
        <div class="ranking-container">
            <div class="ranking-header">
                <h1 style="font-size: 2.5rem; font-weight: 900; margin-bottom: 10px;"> 명예의 전당</h1>
                <p style="color: var(--color-text-muted); font-size: 1.1rem;">엔터핑 전체 종합 랭킹입니다. 부문별 최고를 확인하세요!</p>
                
                <div style="margin-top: 20px;">
                    <button class="btn btn-outline" onclick="location.href='/ranking/songs'" style="font-size: 0.95rem; padding: 10px 25px; background: var(--theme-bg-card); color: var(--color-pink); border: 2px solid var(--color-pink); border-radius: 30px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 10px rgba(255, 158, 171, 0.2); transition: all 0.3s ease;">곡별 랭킹 보러가기</button>
                </div>
            </div>

            <div class="ranking-tabs">
                <button class="tab-btn active" onclick="switchTab('typing')">⌨️ 타이핑</button>
                <button class="tab-btn" onclick="switchTab('quiz')"> 퀴즈</button>
                <button class="tab-btn" onclick="switchTab('battle')"> 실시간 대전</button>
            </div>

            <div class="ranking-list">
                <div id="tab-typing" class="tab-content active">
                    <div id="typing-list">로딩 중...</div>
                </div>
                <div id="tab-quiz" class="tab-content">
                    <div id="quiz-list">로딩 중...</div>
                </div>
                <div id="tab-battle" class="tab-content">
                    <div id="battle-list">로딩 중...</div>
                </div>
            </div>
        </div>
    </main>

        <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-container">
            <div class="footer-col brand-col">
                <div class="footer-logo">
                    <img src="/assets/logo_icon.png" alt="Enter Typing Logo">
                </div>
                <p class="footer-desc">일본 문화 콘텐츠를 통해 자연스럽게 언어를 익히는 즐거운 타이핑 플랫폼</p>
                <div class="social-links">
                    <a href="#"><i class="ph-bold ph-twitter-logo"></i></a>
                    <a href="#"><i class="ph-bold ph-github-logo"></i></a>
                </div>
            </div>
            
            <div class="footer-col">
                <h4>서비스</h4>
                <ul>
                    <li><a href="/typing">타이핑 연습</a></li>
                    <li><a href="/quiz">단어 퀴즈</a></li>
                    <li><a href="/battle">멀티플레이</a></li>
                </ul>
            </div>
            
            <div class="footer-col">
                <h4>커뮤니티</h4>
                <ul>
                    <li><a href="/ranking">랭킹</a></li>
                    <li><a href="/notice">공지사항</a></li>
                </ul>
            </div>
            
            <div class="footer-col">
                <h4>고객지원</h4>
                <ul>
                    <li><a href="https://forms.gle/XktdxJWezSjU8pSUA" target="_blank">문의하기</a></li>
                    <li><a href="#" id="footer-open-terms">이용약관</a></li>
                    <li><a href="#" id="footer-open-privacy">개인정보처리방침</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Enter Typing. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/ranking/ranking.js"></script>
    <script src="/i18n.js"></script>
</body>
</html>
