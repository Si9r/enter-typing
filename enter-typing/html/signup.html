<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 엔터핑</title>
    <meta name="description" content="엔터핑에 가입하고 즐거운 타이핑 여정을 시작하세요.">
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <style>
        /* 회원가입 페이지 전용 스타일 */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: var(--color-ivory);
            overflow-x: hidden;
        }

        .auth-page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 60px;
            position: relative;
        }

        /* 배경 블러 장식 */
        .auth-page::before {
            content: '';
            position: fixed;
            top: -120px;
            right: -100px;
            width: 420px;
            height: 420px;
            border-radius: 50%;
            background: rgba(144, 238, 144, 0.15);
            filter: blur(90px);
            pointer-events: none;
            z-index: 0;
        }

        .auth-page::after {
            content: '';
            position: fixed;
            bottom: -100px;
            left: -100px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(255, 182, 193, 0.15);
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        /* 카드 */
        .auth-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 52px 48px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.07);
            border: 1px solid rgba(0, 0, 0, 0.04);
            position: relative;
            z-index: 1;
            animation: cardFadeIn 0.5s ease;
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* 상단 로고 */
        .auth-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--color-text-main);
            margin-bottom: 32px;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
        }

        .auth-logo .logo-icon {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border-radius: 50%;
            padding: 5px;
            font-size: 1.2rem;
        }

        /* 제목 */
        .auth-heading {
            font-size: 1.9rem;
            font-weight: 900;
            color: var(--color-text-main);
            margin-bottom: 8px;
            text-align: center;
        }

        .auth-subheading {
            font-size: 0.95rem;
            color: var(--color-text-muted);
            text-align: center;
            margin-bottom: 36px;
            font-weight: 500;
        }

        /* 입력 폼 */
        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--color-text-main);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid var(--color-border);
            border-radius: 14px;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.97rem;
            color: var(--color-text-main);
            background-color: #fafafa;
            transition: border-color 0.2s, box-shadow 0.2s, background-color 0.2s;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--color-pink);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(255, 182, 193, 0.2);
        }

        .form-input::placeholder {
            color: #bbb;
            font-weight: 400;
        }

        /* 힌트 텍스트 */
        .form-hint {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 5px;
            font-weight: 500;
        }

        /* 에러 메시지 */
        .form-error {
            font-size: 0.82rem;
            color: #e74c3c;
            margin-top: 6px;
            display: none;
            font-weight: 600;
        }

        .form-error.visible {
            display: block;
        }

        /* 성공 메시지 */
        .form-success {
            font-size: 0.82rem;
            color: #27ae60;
            margin-top: 6px;
            display: none;
            font-weight: 600;
        }

        .form-success.visible {
            display: block;
        }

        /* 입력 오류 상태 */
        .form-input.error {
            border-color: #e74c3c;
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.12);
        }

        .form-input.valid {
            border-color: #27ae60;
            box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.12);
        }

        /* 인라인 그룹 (두 컬럼) */
        .form-row {
            display: flex;
            gap: 14px;
        }

        .form-row .form-group {
            flex: 1;
        }

        /* 비밀번호 강도 표시 */
        .password-strength {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }

        .strength-bar {
            flex: 1;
            height: 4px;
            border-radius: 4px;
            background: #eee;
            transition: background-color 0.3s;
        }

        .strength-bar.weak   { background: #e74c3c; }
        .strength-bar.medium { background: #f39c12; }
        .strength-bar.strong { background: #27ae60; }

        .strength-label {
            font-size: 0.78rem;
            color: #aaa;
            margin-top: 4px;
            font-weight: 600;
        }

        /* 이용약관 동의 */
        .terms-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .terms-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            cursor: pointer;
        }

        .terms-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            accent-color: var(--color-pink);
            cursor: pointer;
            margin-top: 1px;
        }

        .terms-item .terms-text {
            font-size: 0.88rem;
            color: var(--color-text-muted);
            line-height: 1.5;
            font-weight: 500;
        }

        .terms-item .terms-text a {
            color: var(--color-pink);
            text-decoration: none;
            font-weight: 700;
        }

        .terms-item .terms-text a:hover {
            text-decoration: underline;
        }

        .terms-item.all-agree .terms-text {
            font-weight: 700;
            color: var(--color-text-main);
            font-size: 0.92rem;
        }

        .terms-divider {
            height: 1px;
            background: var(--color-border);
            margin: 2px 0;
        }

        /* 회원가입 버튼 */
        .btn-auth {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: none;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-auth-primary {
            background: linear-gradient(135deg, var(--color-pink) 0%, #FFD6DC 100%);
            color: var(--theme-text-main);
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.4);
        }

        .btn-auth-primary:hover {
            background: linear-gradient(135deg, var(--color-pink-hover) 0%, var(--color-pink) 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 182, 193, 0.5);
            color: #fff;
        }

        .btn-auth-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 구분선 */
        .divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--color-border);
        }

        .divider span {
            font-size: 0.82rem;
            color: #bbb;
            font-weight: 600;
            white-space: nowrap;
        }

        /* 소셜 로그인 버튼 */
        .social-btns {
            display: flex;
            gap: 12px;
        }

        .btn-social {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: 1.5px solid var(--color-border);
            background-color: #fff;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--color-text-main);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-social:hover {
            background-color: #f8f9fa;
            border-color: #ccc;
            transform: translateY(-1px);
        }

        /* 로그인 유도 */
        .auth-footer-text {
            text-align: center;
            margin-top: 28px;
            font-size: 0.92rem;
            color: var(--color-text-muted);
            font-weight: 500;
        }

        .auth-footer-text a {
            color: var(--color-pink);
            text-decoration: none;
            font-weight: 700;
            margin-left: 4px;
            transition: color 0.2s;
        }

        .auth-footer-text a:hover {
            color: var(--color-pink-hover);
            text-decoration: underline;
        }

        /* 다크모드 대응 */
        [data-theme="dark"] body {
            background-color: var(--theme-bg-main);
        }

        [data-theme="dark"] .auth-card {
            background: var(--theme-bg-card);
            border: 1px solid var(--theme-border);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.2);
        }

        [data-theme="dark"] .auth-logo,
        [data-theme="dark"] .auth-heading,
        [data-theme="dark"] .form-label,
        [data-theme="dark"] .form-input,
        [data-theme="dark"] .btn-social {
            color: var(--theme-text-main);
        }

        [data-theme="dark"] .auth-subheading,
        [data-theme="dark"] .form-extras a,
        [data-theme="dark"] .auth-footer-text,
        [data-theme="dark"] .form-input::placeholder,
        [data-theme="dark"] .divider span {
            color: var(--theme-text-muted);
        }

        [data-theme="dark"] .form-input {
            background-color: rgba(0, 0, 0, 0.2);
            border-color: var(--theme-border);
        }

        [data-theme="dark"] .form-input:focus {
            background-color: rgba(0, 0, 0, 0.4);
            border-color: var(--color-pink);
        }

        [data-theme="dark"] .btn-social {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: var(--theme-border);
        }

        [data-theme="dark"] .btn-social:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        [data-theme="dark"] .auth-page::before {
            background: rgba(59, 130, 246, 0.15);
        }

        [data-theme="dark"] .auth-page::after {
            background: rgba(14, 165, 233, 0.15);
        }
    </style>

    <script>
        if (localStorage.getItem('ep_theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <!-- 상단 네비게이션 바 -->
    <header class="navbar">
        <div class="nav-left">
            <div class="logo" onclick="location.href='index.html'">
                <img src="/assets/logo_icon.png" alt="엔터핑 아이콘" class="logo-img">
                <span class="logo-text">엔터핑</span>
            </div>
            <nav class="nav-links">
                <a href="/typing">타이핑</a>
                <a href="/quiz">퀴즈</a>
                <a href="ranking.html">랭킹</a>
                <a href="/battle">실시간 대전</a>
            </nav>
        </div>
        <div class="nav-center">
            <div class="search-bar" onclick="location.href='search.html'">
                <span class="search-icon"><i class="ph-bold ph-magnifying-glass"></i></span>
                <input type="text" placeholder="곡명, 아티스트 검색" readonly>
                <span class="shortcut">Enter</span>
            </div>
        </div>
        <div class="nav-right">
            <a href="notice.html" class="nav-notice-link" style="margin-right: 20px; text-decoration: none; color: var(--color-text-muted); font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; transition: all 0.2s;" onmouseover="this.style.color='var(--color-pink)'; this.style.backgroundColor='rgba(255, 182, 193, 0.15)';" onmouseout="this.style.color='var(--color-text-muted)'; this.style.backgroundColor='transparent';"><i class="ph-fill ph-bell"></i> 공지</a>
            <div class="auth-group">
                <button class="auth-login" onclick="location.href='login.html'">로그인</button>
                <button class="auth-signup" onclick="location.href='signup.html'" style="background-color: var(--color-pink-hover);">회원가입</button>
            </div>
        </div>
    </header>

    <!-- 회원가입 폼 영역 -->
    <main class="auth-page">
        <div class="auth-card">
            <!-- 로고 -->
            <a href="index.html" class="auth-logo">
                <img src="/assets/logo_icon.png" alt="엔터핑 아이콘" style="height:38px;width:auto;">
                <span>엔터핑</span>
            </a>

            <h1 class="auth-heading">엔터핑에 오신 걸 환영해요!</h1>
            <p class="auth-subheading">계정을 만들고 즐거운 타이핑을 시작하세요 </p>

            <form id="signupForm" novalidate>
                <!-- 이름 -->
                <div class="form-group">
                    <label class="form-label" for="signup-name">닉네임</label>
                    <input
                        id="signup-name"
                        class="form-input"
                        type="text"
                        placeholder="사용할 닉네임 (2~12자)"
                        maxlength="12"
                        required
                    >
                    <span class="form-error" id="name-error">닉네임은 2자 이상 12자 이하로 입력해주세요.</span>
                    <span class="form-success" id="name-success">사용 가능한 닉네임입니다.</span>
                </div>

                <!-- 이메일 -->
                <div class="form-group">
                    <label class="form-label" for="signup-email">이메일</label>
                    <input
                        id="signup-email"
                        class="form-input"
                        type="email"
                        placeholder="example@email.com"
                        autocomplete="email"
                        required
                    >
                    <span class="form-error" id="email-error">올바른 이메일 형식을 입력해주세요.</span>
                    <span class="form-success" id="email-success">사용 가능한 이메일입니다.</span>
                </div>

                <!-- 비밀번호 -->
                <div class="form-group">
                    <label class="form-label" for="signup-password">비밀번호</label>
                    <input
                        id="signup-password"
                        class="form-input"
                        type="password"
                        placeholder="영문, 숫자 포함 8자 이상"
                        autocomplete="new-password"
                        required
                    >
                    <!-- 비밀번호 강도 -->
                    <div class="password-strength" id="strength-bars">
                        <div class="strength-bar" id="bar1"></div>
                        <div class="strength-bar" id="bar2"></div>
                        <div class="strength-bar" id="bar3"></div>
                        <div class="strength-bar" id="bar4"></div>
                    </div>
                    <p class="strength-label" id="strength-label"></p>
                    <span class="form-error" id="password-error">영문, 숫자를 포함하여 8자 이상 입력해주세요.</span>
                </div>

                <!-- 비밀번호 확인 -->
                <div class="form-group">
                    <label class="form-label" for="signup-password-confirm">비밀번호 확인</label>
                    <input
                        id="signup-password-confirm"
                        class="form-input"
                        type="password"
                        placeholder="비밀번호를 다시 입력하세요"
                        autocomplete="new-password"
                        required
                    >
                    <span class="form-error" id="confirm-error">비밀번호가 일치하지 않습니다.</span>
                    <span class="form-success" id="confirm-success">비밀번호가 일치합니다 ✓</span>
                </div>

                <!-- 이용약관 -->
                <div class="terms-group">
                    <label class="terms-item all-agree">
                        <input type="checkbox" id="agree-all">
                        <span class="terms-text">전체 동의</span>
                    </label>
                    <div class="terms-divider"></div>
                    <label class="terms-item">
                        <input type="checkbox" id="agree-terms" required>
                        <span class="terms-text">
                            (필수) <a href="#" id="footer-open-terms">이용약관</a>에 동의합니다.
                        </span>
                    </label>
                    <label class="terms-item">
                        <input type="checkbox" id="agree-privacy" required>
                        <span class="terms-text">
                            (필수) <a href="#" id="footer-open-privacy">개인정보 처리방침</a>에 동의합니다.
                        </span>
                    </label>
                    <label class="terms-item">
                        <input type="checkbox" id="agree-marketing">
                        <span class="terms-text">
                            (선택) 이벤트 및 마케팅 정보 수신에 동의합니다.
                        </span>
                    </label>
                    <span class="form-error" id="terms-error" style="display:none;">필수 약관에 동의해주세요.</span>
                </div>

                <!-- 회원가입 버튼 -->
                <button id="signup-btn" type="submit" class="btn-auth btn-auth-primary">회원가입</button>
            </form>

            <!-- 로그인 유도 -->
            <p class="auth-footer-text">
                이미 계정이 있으신가요?
                <a href="login.html">로그인하기</a>
            </p>
        </div>
    </main>

    <script src="/js/auth/signup.js"></script>
    <script src="/navbar.js?v=2.0.0"></script>
</body>

</html>
