<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타이핑 목록 - 엔터핑</title>
    <link rel="stylesheet" href="/style.css?v=1.0.3">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <style>
        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
        }

        .detail-container {
            width: 100%;
            max-width: 900px;
            background: var(--theme-bg-card);
            border-radius: 24px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            display: flex;
            gap: 50px;
            position: relative;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.show .detail-container {
            transform: translateY(0);
        }

        .modal-close-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            background: transparent;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #aaa;
            transition: color 0.2s;
        }

        .modal-close-btn:hover {
            color: var(--theme-text-main);
        }

        .detail-cover {
            width: 320px;
            height: 320px;
            background: linear-gradient(135deg, var(--color-pink), var(--color-blue));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 5rem;
            font-weight: 900;
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.3);
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .detail-cover::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.2) 0%, rgba(0, 0, 0, 0) 100%);
        }

        .detail-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero-banner {
            background: linear-gradient(135deg, rgba(255, 123, 142, 0.1), rgba(255, 209, 123, 0.1));
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        [data-theme="dark"] #sort-select option {
            background-color: var(--theme-bg-main);
            color: var(--theme-text-main);
        }

        .detail-title {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--theme-text-main);
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .detail-artist {
            font-size: 1.2rem;
            color: var(--theme-text-muted);
            font-weight: 700;
            margin-bottom: 25px;
        }

        .detail-stats {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            padding: 20px 0;
            border-top: 1px solid var(--theme-border);
            border-bottom: 1px solid var(--theme-border);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .stat-item .label {
            font-size: 0.85rem;
            color: var(--theme-text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-item .value {
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--theme-text-main);
        }

        .detail-desc {
            font-size: 1.05rem;
            color: var(--theme-text-sub);
            line-height: 1.7;
            margin-bottom: 35px;
            flex-grow: 1;
            font-weight: 500;
        }

        .detail-actions {
            display: flex;
            gap: 15px;
        }
    </style>

    <script>
        if (localStorage.getItem('ep_theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <!-- 상단 네비게이션 바 -->
    <header class="navbar">
        <div class="nav-left">
            <div class="logo" onclick="location.href='/'">
                <img src="/assets/logo_icon.png" alt="엔터핑 아이콘" class="logo-img">
                <span class="logo-text">엔터핑</span>
            </div>
            <nav class="nav-links">
                <a href="/typing" class="active">타이핑</a>
                <a href="/quiz">퀴즈</a>
                <a href="/ranking">랭킹</a>
                <a href="/battle">실시간 대전</a>
            </nav>
        </div>
        <div class="nav-center">
            <div class="search-bar" onclick="location.href='/search'">
                <span class="search-icon"><i class="ph-bold ph-magnifying-glass"></i></span>
                <input type="text" placeholder="곡명, 아티스트 검색" readonly>
                <span class="shortcut">Enter</span>
            </div>
        </div>
        <div class="nav-right">
            <a href="/notice" class="nav-notice-link"
                style="margin-right: 20px; text-decoration: none; color: var(--theme-text-muted); font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; transition: all 0.2s;"
                onmouseover="this.style.color='var(--color-pink)'; this.style.backgroundColor='rgba(255, 182, 193, 0.15)';"
                onmouseout="this.style.color='var(--theme-text-muted)'; this.style.backgroundColor='transparent';"><i class="ph-fill ph-bell"></i>
                공지</a>
            <div class="auth-group">
                <button class="auth-login" onclick="location.href='/login'">로그인</button>
                <button class="auth-signup" onclick="location.href='/signup'">회원가입</button>
            </div>
        </div>
    </header>

    <script src="/navbar.js?v=2.0.0"></script>

    <!-- 메인 컨텐츠 -->
    <main
        style="margin-top: 80px; flex: 1; padding: 0 40px; display: flex; flex-direction: column; align-items: center;">
        <section class="content-section" style="padding-top: 40px; width: 100%; max-width: 1200px;">
            <div class="section-header" style="display: flex; justify-content: space-between; align-items: center;">
                <h2> 모든 타이핑 콘텐츠</h2>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-pink"
                        onclick="if(window.NavAuth && window.NavAuth.getUser()) { location.href='/typing/create'; } else { alert('로그인이 필요한 서비스입니다.'); location.href='/login'; }"
                        style="display: flex; align-items: center; gap: 8px; border-radius: 30px; padding: 10px 22px;">
                        <span style="font-size: 1.5rem; font-weight: bold; line-height: 1;">+</span> 타이핑 추가하기
                    </button>
                </div>
            </div>

            <div
                style="margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
                <div id="category-buttons" style="display: flex; gap: 12px; flex-wrap: wrap;">
                    <button class="btn btn-pink" style="padding: 8px 20px;" onclick="setCategory('전체')">전체</button>
                    <button class="btn btn-outline" style="padding: 8px 20px;"
                        onclick="setCategory('JPOP')">JPOP</button>
                    <button class="btn btn-outline" style="padding: 8px 20px;"
                        onclick="setCategory('ANIME')">애니메이션</button>
                </div>
                <div>
                    <select id="sort-select" onchange="setSort(this.value)"
                        style="padding: 10px 15px; border: 1.5px solid var(--theme-border); border-radius: 8px; outline: none; font-weight: 700; color: var(--theme-text-sub); background: var(--theme-bg-card); cursor: pointer;">
                        <option value="recent">등록순</option>
                        <option value="popular">인기순</option>
                    </select>
                </div>
            </div>

            <div class="card-grid" id="card-grid">
                <!-- 동적으로 카드가 추가될 공간 -->
            </div>

            <div style="text-align: center; margin-top: 60px;">
                <button id="load-more-btn" class="btn btn-blue-outline btn-large" style="display: inline-flex;"
                    onclick="loadMore()">더 많은 콘텐츠 보기</button>
            </div>
        </section>
    </main>

        <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-container">
            <div class="footer-col brand-col">
                <div class="footer-logo">
                    <img src="/assets/logo/logo-typo.svg" alt="Enter Typing Logo">
                </div>
                <p class="footer-desc">일본 문화 콘텐츠를 통해 자연스럽게 언어를 익히는 즐거운 타이핑 플랫폼</p>
                <div class="social-links">
                    <a href="#"><i class="ph-bold ph-twitter-logo"></i></a>
                    <a href="#"><i class="ph-bold ph-github-logo"></i></a>
                </div>
            </div>
            
            <div class="footer-col">
                <h4>서비스</h4>
                <ul>
                    <li><a href="typing_list.html">타이핑 연습</a></li>
                    <li><a href="quiz_list.html">단어 퀴즈</a></li>
                    <li><a href="battle_list.html">멀티플레이</a></li>
                </ul>
            </div>
            
            <div class="footer-col">
                <h4>커뮤니티</h4>
                <ul>
                    <li><a href="ranking.html">랭킹</a></li>
                    <li><a href="#">공지사항</a></li>
                </ul>
            </div>
            
            <div class="footer-col">
                <h4>고객지원</h4>
                <ul>
                    <li><a href="https://forms.gle/XktdxJWezSjU8pSUA" target="_blank">문의하기</a></li>
                    <li><a href="#" id="footer-open-terms">이용약관</a></li>
                    <li><a href="#" id="footer-open-privacy">개인정보처리방침</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2025 Enter Typing. All rights reserved.</p>
        </div>
    </footer>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="detail-modal" onclick="closeModal(event)">
        <div class="detail-container" onclick="event.stopPropagation()">
            <button class="modal-close-btn" onclick="closeModal(event)">×</button>
            <div class="detail-cover" id="modal-cover"></div>
            <div class="detail-info">
                <div class="card-badge pink" style="margin-bottom: 15px;" id="modal-genre">JPOP</div>
                <h1 class="detail-title" id="modal-title">로딩 중...</h1>
                <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 25px;">
                    <div class="detail-artist" id="modal-artist" style="margin-bottom: 0;">-</div>
                    <div style="font-size: 0.95rem; color: var(--theme-text-muted); font-weight: 500;">
                        제작자: <span id="modal-creator" style="color: var(--color-pink); font-weight: 700;">엔터핑</span>
                    </div>
                </div>

                <div class="detail-stats">
                    <div class="stat-item">
                        <span class="label">난이도</span>
                        <span id="modal-difficulty" class="value"></span>
                    </div>
                    <div class="stat-item">
                        <span class="label">플레이 수</span>
                        <span id="modal-play-count" class="value">0회</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">시간</span>
                        <span id="modal-best-time" class="value">0초</span>
                    </div>
                </div>

                <p class="detail-desc" id="modal-desc">
                    로딩 중...
                </p>

                <div class="detail-actions">
                    <button id="modal-start-btn" class="btn btn-pink btn-large" style="flex: 1;">
                        ▶ 타이핑 시작하기
                    </button>
                    <button id="modal-rank-btn" class="btn btn-outline btn-large"
                        onclick="location.href='/ranking/songs'">
                         랭킹 보기
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/typing/list.js"></script>
    <script src="/i18n.js"></script>
</body>

</html>
