<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인기 타이핑 리스트</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: var(--color-ivory); }
        h1 { color: var(--color-text-main); margin-bottom: 20px; }
        a { text-decoration: none; color: var(--color-blue); font-weight: bold; font-size: 1.2rem; padding: 10px 20px; border: 2px solid var(--color-blue); border-radius: 10px; transition: all 0.3s; }
        a:hover { background-color: var(--color-blue); color: white; }
    </style>

    <script>
        if (localStorage.getItem('ep_theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <h1>이곳은 인기 타이핑 리스트입니다.</h1>
    <a href="/">메인으로 돌아가기</a>
    <script src="/i18n.js"></script>
</body>
</html>
