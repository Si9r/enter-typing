<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>콘텐츠별 랭킹 - 엔터핑</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: var(--color-bg); min-height: 100vh; }
    .ranking-wrap { width: min(1120px, calc(100% - 40px)); margin: 110px auto 60px; }
    .ranking-head { display: flex; justify-content: space-between; gap: 20px; align-items: end; margin-bottom: 20px; }
    .ranking-head h1 { margin: 0 0 8px; font-size: 2.1rem; color: var(--color-text-main); }
    .ranking-head p { margin: 0; color: #6b7280; }
    .ranking-tabs, .content-filter { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .ranking-tabs button, .content-filter button { border: 1px solid #d9dee8; background: white; border-radius: 999px; padding: 9px 16px; cursor: pointer; font-weight: 800; color: #4b5563; }
    .ranking-tabs button.active, .content-filter button { background: var(--color-pink); border-color: var(--color-pink); color: white; }
    .content-filter { margin-bottom: 20px; background: white; border: 1px solid #edf0f5; padding: 14px; border-radius: 12px; }
    .content-filter input { width: 180px; border: 1px solid #d9dee8; border-radius: 10px; padding: 10px 12px; font: inherit; }
    .ranking-panel { background: white; border: 1px solid #edf0f5; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 24px rgba(20, 24, 40, 0.06); }
    .ranking-toolbar { display: flex; justify-content: space-between; align-items: center; padding: 16px 18px; border-bottom: 1px solid #edf0f5; color: #6b7280; font-weight: 700; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid #f0f2f6; font-size: 0.95rem; }
    th { background: #fafbfc; color: #667085; font-size: 0.82rem; text-transform: uppercase; }
    .rank-cell, .score-cell { font-weight: 900; color: var(--color-text-main); }
    .rank-title { font-weight: 900; color: var(--color-text-main); }
    .rank-sub { margin-top: 3px; color: #8a94a6; font-size: 0.82rem; }
    .mode-pill { display: inline-flex; min-width: 56px; justify-content: center; border-radius: 999px; padding: 5px 9px; font-size: 0.78rem; font-weight: 900; }
    .mode-pill.typing { background: #e8f4ff; color: #1264a3; }
    .mode-pill.quiz { background: #fff0f4; color: #c42355; }
    .ranking-empty { display: none; padding: 42px; text-align: center; color: #8a94a6; font-weight: 800; }
    @media (max-width: 760px) { .ranking-head { align-items: flex-start; flex-direction: column; } .ranking-panel { overflow-x: auto; } table { min-width: 760px; } }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="nav-left">
      <div class="logo" onclick="location.href='index.html'">
        <img src="assets/logo_icon.png" alt="엔터핑 아이콘" class="logo-img">
        <span class="logo-text">엔터핑</span>
      </div>
      <nav class="nav-links">
        <a href="typing_list.html">타이핑</a>
        <a href="quiz_list.html">퀴즈</a>
        <a href="ranking_song.html" class="active">랭킹</a>
        <a href="notice.html">공지</a>
      </nav>
    </div>
    <div class="nav-right"><div class="auth-group"></div></div>
  </header>
  <script src="navbar.js?v=1.0.2"></script>

  <main class="ranking-wrap">
    <div class="ranking-head">
      <div>
        <h1>콘텐츠별 랭킹</h1>
        <p>콘텐츠 ID를 입력하면 해당 타이핑/퀴즈 기록만 비교합니다.</p>
      </div>
      <div class="ranking-tabs">
        <button data-ranking-mode="all" class="active">전체</button>
        <button data-ranking-mode="typing">타이핑</button>
        <button data-ranking-mode="quiz">퀴즈</button>
      </div>
    </div>

    <div class="content-filter">
      <label for="ranking-content-id" style="font-weight:900;color:#4b5563;">콘텐츠 ID</label>
      <input id="ranking-content-id" inputmode="numeric" placeholder="예: 2">
      <button id="ranking-content-apply">조회</button>
    </div>

    <section class="ranking-panel">
      <div class="ranking-toolbar">
        <span>Top 50</span>
        <span id="ranking-status">불러오는 중...</span>
      </div>
      <table>
        <thead>
          <tr><th>순위</th><th>종류</th><th>콘텐츠</th><th>닉네임</th><th>점수</th><th>정확도</th><th>지표</th><th>날짜</th></tr>
        </thead>
        <tbody id="ranking-body"></tbody>
      </table>
      <div class="ranking-empty" id="ranking-empty">아직 랭킹 기록이 없습니다.</div>
    </section>
  </main>

  <script>window.RANKING_CONFIG = { defaultMode: "all", contentScoped: true };</script>
  <script src="ranking.js"></script>
</body>
</html>
