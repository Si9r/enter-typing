<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로필 상세 페이지</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: var(--color-ivory); }
        h1 { color: var(--color-text-main); margin-bottom: 20px; }
        a { text-decoration: none; color: var(--color-blue); font-weight: bold; font-size: 1.2rem; padding: 10px 20px; border: 2px solid var(--color-blue); border-radius: 10px; transition: all 0.3s; }
        a:hover { background-color: var(--color-blue); color: white; }
    </style>
</head>
<body>
    <!-- 상단 네비게이션 바 -->
    <header class="navbar">
        <div class="nav-left">
            <div class="logo" onclick="location.href='index.html'">
                <img src="assets/logo_icon.png" alt="엔터핑 아이콘" class="logo-img">
                <span class="logo-text">엔터핑</span>
            </div>
            <nav class="nav-links">
                <a href="typing_list.html">타이핑</a>
                <a href="quiz_list.html">퀴즈</a>
                <a href="battle_list.html">대전</a>
                <a href="ranking.html">랭킹</a>
                <a href="notice.html">공지</a>
            </nav>
        </div>
        <div class="nav-center">
            <div class="search-bar" onclick="location.href='search.html'">
                <span class="search-icon">🔍</span>
                <input type="text" placeholder="곡명, 아티스트 검색" readonly>
                <span class="shortcut">Enter</span>
            </div>
        </div>
        <div class="nav-right">
            <div class="auth-group">
                <button class="auth-login" onclick="location.href='login.html'">로그인</button>
                <button class="auth-signup" onclick="location.href='signup.html'">회원가입</button>
            </div>
        </div>
    </header>

    <!-- 공통 navbar 상태 관리 -->
    <script src="navbar.js?v=1.0.2"></script>

    <h1>이곳은 프로필 상세 페이지입니다.</h1>
    <a href="index.html">메인으로 돌아가기</a>
</body>
</html>
