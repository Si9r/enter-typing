<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#faf9fc">
  <title>プロフィール - エンターピング</title>
  <link rel="stylesheet" href="TPprofile.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-icon" aria-hidden="true">♪</span>
      <span>エンターピング</span>
    </div>
    <nav class="top-nav" aria-label="メニュー">
      <a href="TPprofile.html">マイページ</a>
      <a href="typing.html">タイピング</a>
      <a href="#">クイズ </a>
      <a href="#">告知</a>
      <a href="TPprofile.html" class="active">プロフィール</a>
    </nav>
  </header>

  <main class="page">
    <section class="page-head">
      <span class="label">MY DASHBOARD</span>
      <h1>マイ プロフィール</h1>
      <p>レベル・統計・最近のプレイをまとめて確認できます。</p>
    </section>

    <section class="layout">
      <article class="profile-card">
        <div class="profile-main">
          <div class="avatar" aria-hidden="true">🎧</div>
          <div>
            <div class="user-line">
              <h2></h2>
              <span class="badge"></span>
            </div>
            <p class="meta"></p>
          </div>
        </div>

        <div class="progress-wrap">
          <div class="progress-head">
            <span>Lv.</span>
            <span></span>
          </div>
          <div class="progress"><span></span></div>
        </div>

        <div class="stats">
          <div class="stat-card">
            <small>総プレイ時間</small>
            <strong></strong>
          </div>
          <div class="stat-card">
            <small>連続ログイン</small>
            <strong></strong>
          </div>
          <div class="stat-card">
            <small>勝利数</small>
            <strong></strong>
          </div>
          <div class="stat-card">
            <small>平均精度</small>
            <strong></strong>
          </div>
        </div>

        <div class="btn-row">
          <button class="btn primary" type="button">プロフィール編集</button>
          <button class="btn secondary" type="button">設定</button>
        </div>
      </article>

      <aside class="subgrid">
        <section class="list-card">
          <h3>最近プレイ</h3>
          <ul class="recent-list">
            <li><span></span><span class="score"></span></li>
            <li><span></span><span class="score"></span></li>
            <li><span></span><span class="score"></span></li>
            <li><span></span><span class="score"></span></li>
          </ul>
        </section>

        <section class="list-card">
          <h3>今日の状態</h3>
          <ul class="recent-list">
            <li><span>入力速度</span><span class="score"></span></li>
            <li><span>正確度</span><span class="score"></span></li>
            <li><span>連続成功</span><span class="score"></span></li>
          </ul>
        </section>
      </aside>
    </section>
  </main>
</body>
</html>
