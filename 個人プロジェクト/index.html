<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>motto - Real-time Ranking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Noto Sans JP', sans-serif;
        }
        body {
            background-color: #000000;
            color: #ffffff;
        }
        .motto-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('ranking');
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [showRegisterModal, setShowRegisterModal] = useState(false);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [username, setUsername] = useState('');

            return (
                <div className="min-h-screen bg-black flex flex-col">
                    {/* Top Bar with App Name */}
                    <div className="fixed top-0 left-0 right-0 z-50 bg-black/90 backdrop-blur-sm border-b border-gray-800">
                        <div className="px-4 py-3">
                            <h1 className="text-3xl font-bold motto-gradient">motto</h1>
                        </div>
                    </div>

                    {/* Login Modal */}
                    {showLoginModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm">
                            <div className="bg-gray-900 rounded-2xl p-6 w-full max-w-md mx-4 border border-gray-800">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-bold text-white">ログイン</h2>
                                    <button
                                        onClick={() => setShowLoginModal(false)}
                                        className="text-gray-400 hover:text-white"
                                    >
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                        </svg>
                                    </button>
                                </div>
                                <form className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-300 mb-1">ユーザー名</label>
                                        <input
                                            type="text"
                                            className="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-purple-500"
                                            placeholder="ユーザー名を入力"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-300 mb-1">パスワード</label>
                                        <input
                                            type="password"
                                            className="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-purple-500"
                                            placeholder="パスワードを入力"
                                        />
                                    </div>
                                    <button
                                        type="button"
                                        onClick={() => {
                                            setIsLoggedIn(true);
                                            setUsername('テストユーザー');
                                            setShowLoginModal(false);
                                        }}
                                        className="w-full py-2 bg-purple-600 hover:bg-purple-700 rounded-lg text-white font-medium transition-colors"
                                    >
                                        ログイン
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Register Modal */}
                    {showRegisterModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm">
                            <div className="bg-gray-900 rounded-2xl p-6 w-full max-w-md mx-4 border border-gray-800">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-bold text-white">会員登録</h2>
                                    <button
                                        onClick={() => setShowRegisterModal(false)}
                                        className="text-gray-400 hover:text-white"
                                    >
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                        </svg>
                                    </button>
                                </div>
                                <form className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-300 mb-1">ユーザー名</label>
                                        <input
                                            type="text"
                                            className="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-purple-500"
                                            placeholder="ユーザー名を入力"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-300 mb-1">メールアドレス</label>
                                        <input
                                            type="email"
                                            className="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-purple-500"
                                            placeholder="example@email.com"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-300 mb-1">パスワード</label>
                                        <input
                                            type="password"
                                            className="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-purple-500"
                                            placeholder="パスワードを入力"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-300 mb-1">パスワード（確認）</label>
                                        <input
                                            type="password"
                                            className="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-purple-500"
                                            placeholder="パスワードを再入力"
                                        />
                                    </div>
                                    <button
                                        type="button"
                                        onClick={() => {
                                            setIsLoggedIn(true);
                                            setUsername('新規ユーザー');
                                            setShowRegisterModal(false);
                                        }}
                                        className="w-full py-2 bg-purple-600 hover:bg-purple-700 rounded-lg text-white font-medium transition-colors"
                                    >
                                        会員登録
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Main Content Area */}
                    <div className="flex-1 pt-16 pb-20 px-4">
                        {activeTab === 'ranking' && (
                            <div className="space-y-4">
                                <h2 className="text-xl font-semibold text-gray-200 mb-4">ランキング</h2>
                                <div className="text-gray-400 text-center py-8">
                                    ランキングコンテンツがここに表示されます
                                </div>
                            </div>
                        )}
                        {activeTab === 'profile' && (
                            <div className="space-y-4">
                                {!isLoggedIn ? (
                                    <div className="text-center py-12">
                                        <div className="w-20 h-20 mx-auto mb-4 bg-gray-800 rounded-full flex items-center justify-center">
                                            <svg className="w-10 h-10 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                            </svg>
                                        </div>
                                        <h2 className="text-xl font-semibold text-gray-200 mb-2">プロフィール</h2>
                                        <p className="text-gray-400 mb-6">会員登録してプロフィールを作成しましょう</p>
                                        <button
                                            onClick={() => setShowRegisterModal(true)}
                                            className="px-6 py-2 bg-purple-600 hover:bg-purple-700 rounded-lg text-white font-medium transition-colors"
                                        >
                                            会員登録
                                        </button>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        <div className="bg-gray-900 rounded-xl p-4 border border-gray-800">
                                            <h3 className="text-lg font-semibold text-white mb-3">ユーザー名</h3>
                                            <p className="text-gray-300">{username}</p>
                                        </div>

                                        <div className="bg-gray-900 rounded-xl p-4 border border-gray-800">
                                            <h3 className="text-lg font-semibold text-white mb-3">お気に入りの映画</h3>
                                            <div className="space-y-2">
                                                <div className="bg-gray-800 rounded-lg p-3">
                                                    <span className="text-gray-300">映画タイトル1</span>
                                                </div>
                                                <div className="bg-gray-800 rounded-lg p-3">
                                                    <span className="text-gray-300">映画タイトル2</span>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="bg-gray-900 rounded-xl p-4 border border-gray-800">
                                            <h3 className="text-lg font-semibold text-white mb-3">最近見た映画</h3>
                                            <div className="space-y-2">
                                                <div className="bg-gray-800 rounded-lg p-3">
                                                    <span className="text-gray-300">映画タイトル3</span>
                                                </div>
                                                <div className="bg-gray-800 rounded-lg p-3">
                                                    <span className="text-gray-300">映画タイトル4</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                        {activeTab === 'search' && (
                            <div className="space-y-4">
                                <h2 className="text-xl font-semibold text-gray-200 mb-4">検索</h2>
                                <div className="text-gray-400 text-center py-8">
                                    検索コンテンツがここに表示されます
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Bottom Navigation */}
                    <div className="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-sm border-t border-gray-800">
                        <div className="flex justify-around items-center py-3">
                            <button
                                onClick={() => setActiveTab('ranking')}
                                className={`flex flex-col items-center space-y-1 px-3 py-2 rounded-lg transition-all ${
                                    activeTab === 'ranking' 
                                        ? 'text-white bg-gray-800/50' 
                                        : 'text-gray-500 hover:text-gray-300'
                                }`}
                            >
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                                </svg>
                                <span className="text-xs font-medium">ランキング</span>
                            </button>
                            <button
                                onClick={() => setActiveTab('search')}
                                className={`flex flex-col items-center space-y-1 px-3 py-2 rounded-lg transition-all ${
                                    activeTab === 'search' 
                                        ? 'text-white bg-gray-800/50' 
                                        : 'text-gray-500 hover:text-gray-300'
                                }`}
                            >
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                </svg>
                                <span className="text-xs font-medium">検索</span>
                            </button>
                            <button
                                onClick={() => setActiveTab('profile')}
                                className={`flex flex-col items-center space-y-1 px-3 py-2 rounded-lg transition-all ${
                                    activeTab === 'profile' 
                                        ? 'text-white bg-gray-800/50' 
                                        : 'text-gray-500 hover:text-gray-300'
                                }`}
                            >
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                </svg>
                                <span className="text-xs font-medium">プロフィール</span>
                            </button>
                            {!isLoggedIn ? (
                                <>
                                    <button
                                        onClick={() => setShowLoginModal(true)}
                                        className="flex flex-col items-center space-y-1 px-3 py-2 rounded-lg transition-all text-gray-500 hover:text-gray-300"
                                    >
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                                        </svg>
                                        <span className="text-xs font-medium">ログイン</span>
                                    </button>
                                    <button
                                        onClick={() => setShowRegisterModal(true)}
                                        className="flex flex-col items-center space-y-1 px-3 py-2 rounded-lg transition-all text-gray-500 hover:text-gray-300"
                                    >
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                                        </svg>
                                        <span className="text-xs font-medium">会員登録</span>
                                    </button>
                                </>
                            ) : (
                                <button
                                    onClick={() => {
                                        setIsLoggedIn(false);
                                        setUsername('');
                                    }}
                                    className="flex flex-col items-center space-y-1 px-3 py-2 rounded-lg transition-all text-gray-500 hover:text-gray-300"
                                >
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                                    </svg>
                                    <span className="text-xs font-medium">ログアウト</span>
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
